<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeMaster: Idle Typing Empire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
/* =========================================================
   TypeMaster CSS — expanded readable version.
   Bagian ini sengaja tidak dikompres: tema dark elegant,
   scanline CRT, particle background, navbar, cards, arena,
   keyboard virtual, toko, statistik, modal, toast, responsive.
   ========================================================= */

    :root{

      --bg-primary:#080B14;
--bg-secondary:#0D1117;
--bg-card:#111827;
--accent-gold:#D4AF37;
--accent-gold-light:#F0D060;
--accent-cyan:#00D4FF;
--accent-purple:#8B5CF6;
--accent-green:#10B981;
--accent-red:#EF4444;
--text-primary:#F9FAFB;
--text-secondary:#9CA3AF;
--text-muted:#4B5563;
--border:#1F2937;
--border-glow:rgba(212,175,55,.3);
--glow-cyan:rgba(0,212,255,.2);
--card-shadow:0 18px 50px rgba(0,0,0,.42);
--radius:18px;
--nav-h:76px
    }

    *{
box-sizing:border-box}
 html{
scroll-behavior:smooth}
 body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top left,rgba(0,212,255,.09),transparent 32%),radial-gradient(circle at top right,rgba(212,175,55,.08),transparent 35%),var(--bg-primary);
color:var(--text-primary);
font-family:Inter,system-ui,sans-serif;
overflow-x:hidden}

    body::before{
content:"";
position:fixed;
inset:0;
z-index:-3;
background:linear-gradient(rgba(255,255,255,.021) 50%,transparent 50%);
background-size:100% 4px;
pointer-events:none;
mix-blend-mode:screen;
opacity:.22}
 body::after{
content:"";
position:fixed;
inset:0;
z-index:-4;
background-image:radial-gradient(circle,#fff 1px,transparent 1.4px),radial-gradient(circle,var(--accent-cyan) 1px,transparent 1.4px),radial-gradient(circle,var(--accent-gold) 1px,transparent 1.4px);
background-size:190px 190px,270px 270px,350px 350px;
background-position:0 0,70px 90px,140px 50px;
animation:stars 55s linear infinite;
opacity:.24}
@keyframes stars{
to{
background-position:900px 500px,700px 650px,1000px 700px}
}

    .hidden{
display:none!important}
.muted{
color:var(--text-secondary)}
.gold{
color:var(--accent-gold)}
.cyan{
color:var(--accent-cyan)}
.green{
color:var(--accent-green)}
.red{
color:var(--accent-red)}

    button,input,select,textarea{
font:inherit}
 button{
border:0;
cursor:pointer;
color:var(--text-primary)}

    .btn{
position:relative;
overflow:hidden;
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
padding:10px 15px;
border:1px solid var(--border);
border-radius:14px;
background:linear-gradient(180deg,#192234,#0e1522);
box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
transition:.2s}
.btn:hover{
transform:translateY(-1px);
border-color:var(--border-glow);
box-shadow:0 0 24px var(--border-glow)}
.btn.primary{
background:linear-gradient(135deg,var(--accent-gold),#8b6a16);
color:#111;
font-weight:900}
.btn.cyan{
background:linear-gradient(135deg,var(--accent-cyan),#0369a1);
font-weight:800}
.btn.green{
background:linear-gradient(135deg,var(--accent-green),#065f46);
font-weight:800}
.btn.red{
background:linear-gradient(135deg,var(--accent-red),#7f1d1d);
font-weight:800}
.btn.small{
padding:7px 10px;
border-radius:11px;
font-size:13px}
.btn:disabled{
opacity:.45;
cursor:not-allowed;
filter:grayscale(.4)}
.ripple{
position:absolute;
border-radius:999px;
background:rgba(255,255,255,.35);
transform:scale(0);
animation:ripple .55s ease-out;
pointer-events:none}
@keyframes ripple{
to{
transform:scale(4);
opacity:0}
}

    #loading-screen{
position:fixed;
inset:0;
background:var(--bg-primary);
z-index:9999;
display:grid;
place-items:center;
transition:.45s}
.loader{
text-align:center}
.loader-logo{
font-family:"Cinzel Decorative";
font-size:44px;
color:var(--accent-gold);
text-shadow:0 0 28px var(--border-glow);
animation:pulse 1.5s infinite}
.loader-bar{
width:320px;
height:9px;
background:#101827;
border:1px solid var(--border);
border-radius:999px;
overflow:hidden;
margin-top:22px}
.loader-bar span{
display:block;
height:100%;
width:45%;
background:linear-gradient(90deg,transparent,var(--accent-cyan),var(--accent-gold),transparent);
animation:load 1.1s infinite}
@keyframes load{
from{
transform:translateX(-120%)}
to{
transform:translateX(230%)}
}
@keyframes pulse{
50%{
filter:brightness(1.5);
transform:scale(1.02)}
}

    .app{
min-height:100vh}
.navbar{
height:var(--nav-h);
position:sticky;
top:0;
z-index:50;
background:rgba(8,11,20,.84);
backdrop-filter:blur(18px);
display:grid;
grid-template-columns:280px 1fr 330px;
align-items:center;
padding:0 22px;
border-bottom:1px solid var(--border)}
.brand{
display:flex;
align-items:center;
gap:12px}
.brand-title{
font-family:"Cinzel Decorative";

font-size:22px;

.brand-sub{

@keyframes brandglow{
50%{

}
.nav-menu{
display:flex;
gap:8px;

flex-wrap:wrap}
.nav-btn{

.nav-btn:hover,.nav-btn.active{

.profile{

.avatar{
width:42px;
height:42px;

.level-badge{

background:rgba(212,175,55,.14);

    .hero-stats{
display:grid;
grid-template-columns:repeat(4,1fr);

padding:18px 22px}
.stat-card,.panel,.shop-card,.achievement,.mission,.upgrade-card{

.stat-card{
padding:17px;
position:relative;

.stat-card::after{
content:"";
position:absolute;

width:180px;
height:180px;

.stat-top{

.stat-icon{
font-size:32px;

.stat-value{

.trend{
font-size:12px;

    .layout{
display:grid;
grid-template-columns:260px minmax(0,1fr) 300px;
gap:18px;
padding:0 22px 86px}
.sidebar,.rightbar{
display:flex;
flex-direction:column;
gap:16px}
.panel{
padding:16px}
.panel h3,.panel h2{
margin:0 0 12px;
font-family:Rajdhani;
letter-spacing:.5px}
.side-link{
display:flex;
justify-content:space-between;

width:100%;
margin:7px 0;
padding:10px;

.side-link:hover,.side-link.active{
border-color:var(--border-glow);

.progress{
height:12px;
background:#070b13;
border-radius:999px;
overflow:hidden;
border:1px solid var(--border)}
.progress>span{
display:block;
height:100%;
width:0;
background:linear-gradient(90deg,var(--accent-cyan),var(--accent-purple),var(--accent-gold),var(--accent-cyan));

border-radius:999px}
@keyframes shimmer{
to{
background-position:220% 0}
}

    .main{
min-width:0}
.page{
display:none;
animation:fade .25s ease}
.page.active{
display:block}
@keyframes fade{
from{
opacity:0;
transform:translateY(6px)}
to{
opacity:1;
transform:none}
}
.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px}
.grid-3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px}
.hero-panel{
padding:24px;
background:linear-gradient(130deg,rgba(17,24,39,.98),rgba(13,17,23,.97),rgba(139,92,246,.12));
border:1px solid var(--border-glow);
border-radius:24px;
box-shadow:var(--card-shadow);
position:relative;
overflow:hidden}

font-family:"Cinzel Decorative";

margin:0 0 8px;
color:var(--accent-gold)}
.quick-actions{

gap:10px;
flex-wrap:wrap;
margin-top:18px}
.metric-list{
display:grid;
gap:10px}
.metric{
display:flex;
justify-content:space-between;
border-bottom:1px dashed var(--border);
padding-bottom:8px}
.leader-entry{
display:grid;
grid-template-columns:32px 1fr auto;
gap:9px;
align-items:center;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,.05)}

    .typing-hud{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
margin-bottom:14px}
.hud-box{
text-align:center;
padding:12px;
border-radius:15px;
background:rgba(17,24,39,.85);
border:1px solid var(--border)}
.hud-val{
font-family:Rajdhani;
font-size:28px;
font-weight:800}
.mode-tabs{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:14px}
.typing-area{
padding:22px;
border-radius:22px;
background:#070b13;
border:1px solid var(--border);
min-height:200px;
font-family:"JetBrains Mono",monospace;
font-size:25px;
line-height:1.75;
outline:0}
.typing-area .char{
border-radius:4px;
padding:0 1px}
.typing-area .char.correct{

.typing-controls{

margin:14px 0}
.select,.text-input{

border:1px solid var(--border);
border-radius:12px;
color:var(--text-primary);
padding:10px}
.text-input{
width:100%}

    .keyboard{
position:fixed;
left:50%;
bottom:12px;
transform:translateX(-50%);
z-index:45;
width:min(920px,calc(100vw - 28px));
background:rgba(8,11,20,.9);
backdrop-filter:blur(14px);
border:1px solid var(--border);
border-radius:18px;
padding:12px;
box-shadow:0 0 40px rgba(0,0,0,.45)}
.kb-row{

.key.space{

.key.active{

.finger-l1{

.finger-l2{
--finger:#f97316}
.finger-l3{
--finger:#eab308}
.finger-l4{
--finger:#22c55e}
.finger-l5{
--finger:#14b8a6}
.finger-r1{
--finger:#06b6d4}
.finger-r2{
--finger:#3b82f6}
.finger-r3{
--finger:#8b5cf6}
.finger-r4{
--finger:#d946ef}

.key{

    .shop-grid,.ach-grid{

.toggle.on{

.toggle.on::after{
left:23px}
.finger-map{

grid-template-columns:1fr 1fr;

.hand{

.hand-row{

    @media(max-width:1180px){

/* =========================================================
   FIX: Typing prompt wrapping
   Soal latihan harus tetap berada di dalam kartu/kolom.
   Setiap karakter dibuat inline-block agar browser bisa
   membungkus teks antar karakter walaupun spasi dirender
   sebagai non-breaking space untuk kebutuhan visual trainer.
   ========================================================= */
.typing-area{
  max-width:100%;
  overflow-x:hidden;
  overflow-y:auto;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  word-break:break-word;
}
.typing-area .char{
  display:inline-block;
  vertical-align:baseline;
}


/* =========================================================
   MOBILE + MODAL FIXES
   1) Keyboard virtual tidak fixed di mobile dan bisa scroll.
   2) Tombol modal menahan ripple agar tidak meluber.
   ========================================================= */
.modal .btn{
  position:relative;
  overflow:hidden;
}
@media(max-width:720px){
  .keyboard{
    position:static !important;
    transform:none !important;
    width:100%;
    max-width:100%;
    margin:12px auto 84px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .keyboard .kb-row{
    justify-content:flex-start;
    min-width:max-content;
  }
  .keyboard .key{
    min-width:22px;
    height:32px;
    font-size:10px;
    border-radius:7px;
  }
  .keyboard .key.space{
    width:120px;
    min-width:120px;
  }
}


/* =========================================================
   UX PATCH 06-28: onboarding delay, mobile nav, flash prompt,
   timer bar, pause overlay, result confetti, stats animation,
   cursor blink, owned badge, light theme support.
   ========================================================= */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.stat-card{opacity:0;animation:fadeSlideUp .3s ease forwards;animation-delay:calc(var(--i,0) * .08s)}
@keyframes blink{50%{background:rgba(212,175,55,.35)}}
.typing-area .char.current{animation:blink .7s step-end infinite}
.typing-area.flash{animation:promptFlash .32s ease}
@keyframes promptFlash{50%{border-color:var(--accent-cyan);box-shadow:0 0 28px rgba(0,212,255,.45)}}
.typing-area.paused{position:relative;filter:saturate(.55);opacity:.72}
.typing-area.paused::after{content:"PAUSED";position:absolute;inset:0;display:grid;place-items:center;background:rgba(8,11,20,.72);color:var(--accent-gold);font-family:Rajdhani;font-size:46px;font-weight:900;letter-spacing:4px;text-shadow:0 0 24px var(--border-glow);border-radius:inherit}

{id:'speed60',icon:'⚡',name:'Speed Starter',desc:'Capai 60 WPM',check:s=>s.stats.bestWPM>=60},
{id:'speed80',icon:'🚀',name:'Speed Demon',desc:'Capai 80 WPM',check:s=>s.stats.bestWPM>=80},
{id:'acc95',icon:'🎯',name:'Sniper',desc:'Akurasi 95%+',check:s=>s.stats.bestAccuracy>=95},
{id:'coins1k',icon:'💰',name:'Coin Collector',desc:'Kumpulkan 1.000 coins',check:s=>s.player.coins>=1000||s.stats.totalCoins>=1000},
{id:'words500',icon:'📚',name:'Word Worker',desc:'Ketik 500 kata total',check:s=>s.stats.totalWords>=500},
{id:'streak7',icon:'🔥',name:'On Fire',desc:'7 hari streak',check:s=>s.stats.streak>=7},
{id:'upgrader',icon:'🏗️',name:'Empire Builder',desc:'Beli 5 upgrade',check:s=>Object.values(s.upgrades.levels).reduce((a,b)=>a+b,0)>=5},
{id:'prestige',icon:'💎',name:'Diamond Fingers',desc:'Lakukan prestige pertama',check:s=>s.player.prestige>0},
{id:'god',icon:'🏆',name:'Typing God',desc:'Unlock 9 pencapaian',check:s=>s.achievements.unlocked.length>=9}
];
const skillNodes=['MASTER TYPIST','Speed Master','Accuracy King','Sprint God','Endurance','Precision','Zero Error','Left Hand','Right Hand','Number Row','Symbol Pro','Index L','Index R','Pinky Strong','Thumb Zone'];
const leaderboard=['NusantaraKeys','CyanSamurai','GoldTypist','ByteSultan','RajaWPM','Akurat99','KodeKilat','MechaFinger','BaliCoder','JakartaSwift'].map((n,i)=>({name:n,level:60-i*3,wpm:128-i*6,acc:99-i%5,badge:i<3?'👑':'⚡',avatar:['🦾','🥷','🧙','🤖','🦊'][i%5]}));
const tips=['Letakkan jari telunjuk kiri di F dan kanan di J; rasakan tonjolan kecilnya.','Jangan melihat keyboard terlalu sering; gunakan visualizer sebagai panduan.','Akurasi lebih penting daripada kecepatan pada tahap awal.','Rilekskan bahu dan pergelangan tangan agar tahan lama.','Latih tombol yang sering salah selama 3 menit setiap hari.','Gunakan ritme stabil, bukan mengetik dengan ledakan singkat.'];
const defaultState=()=>({player:{name:'Player',avatar:'🧑‍💻',level:1,xp:0,coins:150,gems:10,prestige:0},stats:{totalWords:0,totalChars:0,totalTime:0,totalCoins:0,bestWPM:0,bestAccuracy:0,streak:1,lastPlay:today(),sessions:0},upgrades:{levels:{}},settings:{sound:true,uiSound:true,music:false,volume:.35,theme:'dark',fontSize:'M',animation:'full',contrast:false,language:'id',difficulty:'auto',showWPM:true,strict:false,textLength:60,layout:'QWERTY',keyboard:true,highlightNext:true,skin:'default',font:'JetBrains Mono',soundPack:'mechanical'},history:[],achievements:{unlocked:[]},dailyMissions:{date:today(),completed:[],progress:{words:0,wpm60:0,modes:[],acc95:0}},owned:['default'],boosters:{xpUntil:0,coinUntil:0,hintUntil:0},fingerErrors:{},skillUnlocked:['Left Hand','Right Hand']});
let state=load();
let typing={active:false,mode:'word',difficulty:'easy',duration:60,timeLeft:60,text:'',index:0,errors:0,typed:0,correct:0,start:0,timer:null,combo:0,lives:3,ghost:null,results:[],usedPrompts:[],promptCount:0,paused:false,wpmHistory:[],lastWpmSample:0};
let charts={}; let audioCtx=null; let currentPage='home'; let saveTimeout=null;
function load(){try{const raw=localStorage.getItem('typemaster_save_v1'); if(raw){const s=Object.assign(defaultState(),JSON.parse(raw)); s.player=Object.assign(defaultState().player,s.player||{}); s.stats=Object.assign(defaultState().stats,s.stats||{}); s.settings=Object.assign(defaultState().settings,s.settings||{}); if(s.dailyMissions?.date!==today()) s.dailyMissions={date:today(),completed:[],progress:{words:0,wpm60:0,modes:[],acc95:0}}; s.skillUnlocked=Array.isArray(s.skillUnlocked)?s.skillUnlocked:defaultState().skillUnlocked; return s;}}catch(e){} return defaultState();}
function saveNow(){try{localStorage.setItem('typemaster_save_v1',JSON.stringify(state));}catch(e){window.__typemasterMemorySave=JSON.stringify(state);}}
function save(){clearTimeout(saveTimeout);saveTimeout=setTimeout(saveNow,2000);}
function toast(msg,type='info'){const box=$('#toast-container');while(box.children.length>=3){box.firstElementChild.remove();}const t=document.createElement('div');t.className='toast '+type;t.innerHTML=msg;box.appendChild(t);setTimeout(()=>{t.style.opacity=0;t.style.transform='translateX(40px)';setTimeout(()=>t.remove(),250)},3600)}
function play(freq=420,dur=.035,type='square'){if((!state.settings.sound && !state.settings.uiSound)||state.settings.soundPack==='silent')return; try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=state.settings.soundPack==='scifi'?'sine':type;o.frequency.value=state.settings.soundPack==='typewriter'?freq*.65:freq;g.gain.value=(state.settings.volume||.35)*.05;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}catch(e){}}
function coinMultiplier(){let m=1+((state.upgrades.levels.mech||0)*.1); if(Date.now()<state.boosters.coinUntil)m*=2; return m}
function xpMultiplier(){let m=1+((state.upgrades.levels.dict||0)*.05); if(Date.now()<state.boosters.xpUntil)m*=2; return m}
function globalIncomeMultiplier(){let m=1+state.player.prestige*.1; if(state.upgrades.levels.studio)m*=Math.pow(2,state.upgrades.levels.studio); if(state.upgrades.levels.agency)m*=Math.pow(5,state.upgrades.levels.agency); return m}
function idleIncome(){return upgrades.reduce((t,u)=>t+(u.baseIncome||0)*(state.upgrades.levels[u.id]||0)*globalIncomeMultiplier(),0)}
function addCoins(n){state.player.coins+=n;state.stats.totalCoins+=n;}
function addXP(n){state.player.xp+=n; let leveled=false; while(state.player.xp>=xpForLevel(state.player.level)){state.player.xp-=xpForLevel(state.player.level);state.player.level++;leveled=true;toast('✨ Level naik ke <b>Lv.'+state.player.level+'</b>!','success');play(800,.12,'triangle')} if(leveled)renderAll();}
function checkAchievements(){achievements.forEach(a=>{if(!state.achievements.unlocked.includes(a.id)&&a.check(state)){state.achievements.unlocked.push(a.id);toast(`🏆 Achievement unlocked: <b>${a.name}</b>`,'success');play(900,.16,'triangle')}})}
function completeMission(id,msg){if(!state.dailyMissions.completed.includes(id)){state.dailyMissions.completed.push(id);toast('🎁 Misi selesai: '+msg,'success'); if(id==='words'){addCoins(100)} if(id==='wpm60'){addXP(200)} if(id==='modes'){state.player.gems+=1;toast('🎁 Loot Box dibuka: +1 gems','success')} if(id==='acc95'){state.player.gems+=50}}}
function updateDaily(words,wpm,acc,mode){const p=state.dailyMissions.progress;p.words+=(words||0); if(wpm>=60)p.wpm60=1; if(acc>=95)p.acc95=1; if(mode&&!p.modes.includes(mode))p.modes.push(mode); if(p.words>=500)completeMission('words','Ketik 500 kata hari ini → +100 coins'); if(p.wpm60)completeMission('wpm60','Capai 60 WPM → +200 XP'); if(p.modes.length>=3)completeMission('modes','Selesaikan 3 mode berbeda → Loot Box'); if(p.acc95)completeMission('acc95','Akurasi 95%+ → +50 gems')}
function animateNumber(el,val,suffix=''){if(!el)return;const old=parseFloat(el.dataset.val||0),start=performance.now(),dur=500;function step(t){const p=clamp((t-start)/dur,0,1);const v=old+(val-old)*(1-Math.pow(1-p,3));el.textContent=fmt(v)+suffix;if(p<1)requestAnimationFrame(step);else{el.dataset.val=val;el.textContent=fmt(val)+suffix}}requestAnimationFrame(step)}
function renderCurrentPage(){if(currentPage==='home')renderHome();else if(currentPage==='practice')renderPractice();else if(currentPage==='arena')renderArena();else if(currentPage==='shop')renderShop();else if(currentPage==='stats')renderStats();else if(currentPage==='achievements')renderAchievements();}
function renderAll(){renderNav();renderHeader();renderCurrentPage();renderKeyboard();renderSidebars();save();}
function renderNav(){const mk=([id,label])=>`<button class="nav-btn ${id===currentPage?'active':''}" data-page="${id}">${label}</button>`;$('#top-nav').innerHTML=nav.map(mk).join('');$('#side-nav').innerHTML=nav.map(([id,label])=>`<button class="side-link ${id===currentPage?'active':''}" data-page="${id}"><span>${label}</span><span>›</span></button>`).join('')}
function renderHeader(){ $('#player-name-view').textContent=state.player.name;$('#avatar-view').textContent=state.player.avatar;$('#level-view').textContent='Lv.'+state.player.level;const xpNeed=xpForLevel(state.player.level);$('#xp-label').textContent=`${fmt(state.player.xp)}/${fmt(xpNeed)}`;$('#xp-bar').style.width=(state.player.xp/xpNeed*100)+'%';$('#coins-footer').textContent=fmt(state.player.coins);$('#income-footer').textContent=idleIncome().toFixed(1);$('#daily-footer').textContent=`${fmt(state.dailyMissions.progress.words||0)}/500 kata`; const stats=[['⚡',Math.round(state.stats.bestWPM),'WPM Terbaik','↗ +'+(state.history[0]?.wpm||0)+' sesi'],['🎯',Math.round(state.stats.bestAccuracy),'Akurasi Tertinggi','↗ konsisten'],['🔥',state.stats.streak,'Streak Aktif (hari)','↗ hari ini'],['⭐',state.player.xp+(state.player.level-1)*100,'Total XP','↗ Lv '+state.player.level]];$('#hero-stats').innerHTML=stats.map((s,i)=>`<div class="stat-card" style="--i:${i}"><div class="stat-top"><span class="stat-icon">${s[0]}</span><span class="trend">${s[3]}</span></div><div class="stat-value" data-stat="${i}">0</div><div class="muted">${s[2]}</div></div>`).join('');stats.forEach((s,i)=>animateNumber($(`[data-stat="${i}"]`),s[1],i===1?'%':''));}
function renderSidebars(){ $('#mini-leaderboard').innerHTML=leaderboard.slice(0,5).map((l,i)=>`<div class="leader-entry"><b>#${i+1}</b><span>${l.avatar} ${l.name}<br><small class="muted">Lv.${l.level} • ${l.badge}</small></span><b class="gold">${l.wpm}</b></div>`).join(''); const unlocked=state.achievements.unlocked.slice(-3); $('#recent-achievements').innerHTML=unlocked.length?unlocked.map(id=>{const a=achievements.find(x=>x.id===id);return `<div class="metric"><span>${a.icon} ${a.name}</span><span class="green">OK</span></div>`}).join(''):'<p class="muted">Belum ada. Selesaikan sesi pertama!</p>'; $('#friends-box').innerHTML=['BudiKeys','SariSpeed','DewaKode'].map((f,i)=>`<div class="npc-card"><span>${['🦊','🐼','🦉'][i]}</span><div><b>${f}</b><br><small class="muted">online • WPM ${70+i*9}</small></div><button class="btn small" data-duel="${f}">Duel</button></div>`).join(''); $('#mini-skills').innerHTML=skillNodes.slice(0,5).map(n=>`<div class="metric"><span>${n}</span><span class="${state.skillUnlocked.includes(n)?'green':'muted'}">${state.skillUnlocked.includes(n)?'✓':'🔒'}</span></div>`).join('')}
function tutorialSeen(){try{return localStorage.getItem('typemaster_seen_tutorial')==='1';}catch(e){return !!window.__typemasterSeenTutorial;}}
function renderHome(){ $('#page-home').innerHTML=`<div class="hero-panel"><h1>Bangun Kerajaan Mengetikmu</h1><p class="muted">Gabungan typing trainer 10 jari, idle tycoon, skill tree, misi harian, dan statistik real-time. Setiap kata menghasilkan coin. Setiap sesi membuat kerajaanmu lebih kuat.</p><div class="quick-actions"><button class="btn primary" data-page="practice">🎯 Quick Play</button><button class="btn cyan" id="home-sprint">⏱️ Sprint 15 Kata</button><button class="btn" data-page="shop">🏪 Beli Upgrade</button><button class="btn" id="home-prestige">💎 Prestige</button>${tutorialSeen()?'':'<button class="btn green" id="hero-tutorial">Baru pertama kali? Mulai Tutorial</button>'}</div></div><br><div class="grid-2"><div class="panel"><h2>🎯 Featured Challenge</h2><p><b>Minggu Ini:</b> Cyber Nusantara Sprint</p><p class="muted">Capai 75 WPM di mode Sprint dan dapatkan badge eksklusif.</p><div class="progress"><span style="width:${clamp(state.stats.bestWPM/75*100,0,100)}%"></span></div><br><button class="btn green" id="start-featured">Mulai Challenge</button></div><div class="panel"><h2>📋 Misi Aktif</h2>${missionHTML()}</div></div><br><div class="grid-3"><div class="panel"><h3>💰 Empire</h3><div class="metric-list"><div class="metric"><span>Coins</span><b class="gold">${fmt(state.player.coins)}</b></div><div class="metric"><span>Gems</span><b class="cyan">${fmt(state.player.gems)}</b></div><div class="metric"><span>Prestige</span><b class="purple">${fmt(state.player.prestige)}</b></div><div class="metric"><span>Idle Income</span><b class="green">${idleIncome().toFixed(1)}/d</b></div></div></div><div class="panel"><h3>🧠 Tips Kontekstual</h3><p>${tips[(state.stats.sessions+state.stats.totalWords)%tips.length]}</p><button class="btn small" id="open-guide">Panduan Posisi Jari</button></div><div class="panel"><h3>📦 Save Data</h3><button class="btn small" id="export-save">Export JSON</button> <button class="btn small" id="import-save">Import JSON</button> <button class="btn small red" id="reset-save">Reset</button></div></div>`;}
function missionHTML(){const p=state.dailyMissions.progress,c=state.dailyMissions.completed;return `<div class="mission"><b>Ketik 500 kata</b><div class="progress"><span style="width:${clamp((p.words||0)/500*100,0,100)}%"></span></div><small>${fmt(p.words||0)}/500 → 100 coins ${c.includes('words')?'✅':''}</small></div><div class="mission"><b>Capai 60 WPM</b><div class="progress"><span style="width:${p.wpm60?100:0}%"></span></div><small>Reward 200 XP ${c.includes('wpm60')?'✅':''}</small></div><div class="mission"><b>Selesaikan 3 mode</b><div class="progress"><span style="width:${clamp((p.modes||[]).length/3*100,0,100)}%"></span></div><small>${(p.modes||[]).length}/3 → Loot Box ${c.includes('modes')?'✅':''}</small></div><div class="mission"><b>Akurasi 95%+</b><div class="progress"><span style="width:${p.acc95?100:0}%"></span></div><small>Reward 50 gems ${c.includes('acc95')?'✅':''}</small></div>`}
function renderPractice(){ $('#page-practice').innerHTML=`<div class="panel"><h2>🎯 Typing Arena <span class="badge">v2 fixed</span></h2><div class="panel" style="margin-bottom:12px;border-color:rgba(0,212,255,.35)"><b class="cyan">Timer bebas + soal lanjut otomatis aktif.</b><br><small class="muted">Isi detik sendiri, lalu selama waktu belum habis setiap soal selesai akan langsung diganti soal baru yang berbeda.</small></div><div class="mode-tabs">${[['word','🎯 Kata'],['sentence','📝 Kalimat'],['symbols','🔢 Angka & Simbol'],['code','💻 Kode'],['sprint','⏱️ Sprint'],['endurance','🏃 Endurance']].map(m=>`<button class="btn small ${typing.mode===m[0]?'primary':''}" data-mode="${m[0]}">${m[1]}</button>`).join('')}</div><div class="typing-controls"><select id="difficulty" class="select"><option value="easy">Mudah</option><option value="medium">Sedang</option><option value="hard">Sulit</option><option value="expert">Expert</option></select><label class="muted" for="duration">Timer</label><input id="duration" class="select" type="number" min="10" max="3600" step="5" value="60" style="width:110px"><span class="muted">detik</span><button class="btn primary" id="start-typing">▶ Mulai</button><button class="btn red small" id="restart-typing">↻ Reset</button><button class="btn small" id="pause-typing">⏸ Pause</button><button class="btn" id="guide-btn">📖 Panduan</button><span class="lives" id="lives-view">❤❤❤</span></div><div class="typing-hud"><div class="hud-box"><div class="hud-val" id="hud-wpm">0</div><canvas id="wpm-spark" class="wpm-spark" width="80" height="30"></canvas><small>WPM</small></div><div class="hud-box"><div class="hud-val" id="hud-acc">100%</div><small>Akurasi</small></div><div class="hud-box"><div class="hud-val" id="hud-cpm">0</div><small>CPM</small></div><div class="hud-box"><div class="hud-val" id="hud-errors">0</div><small>Error</small></div><div class="hud-box"><div class="hud-val" id="hud-combo">0</div><small>Combo</small></div><div class="hud-box"><div class="hud-val" id="hud-time">60</div><small>Detik</small></div></div><div id="ghost-hud" class="panel hidden" style="margin:10px 0;border-color:rgba(139,92,246,.45)"><div class="metric"><span>👻 Ghost Duel</span><b id="ghost-label">-</b></div><div class="progress"><span id="ghost-bar" style="width:0%"></span></div></div><div id="typing-area" class="typing-area" tabindex="0" aria-label="Area latihan mengetik">Tekan Mulai, lalu ketik sesuai teks di sini.</div><div class="timer-track"><div id="timer-bar"></div></div><p class="muted">✅ UPDATE AKTIF: Timer sekarang bisa diisi bebas (10–3600 detik). Jika satu soal selesai tetapi waktu belum habis, soal berikutnya otomatis muncul dan diusahakan tidak mengulang dalam ronde yang sama. Input memakai keyboard fisik.</p></div>`; $('#difficulty').value=typing.difficulty; $('#duration').value=typing.duration; const diffEl=$('#difficulty'); if(diffEl){const hide=typing.mode==='sprint'||typing.mode==='endurance';diffEl.disabled=hide;diffEl.style.opacity=hide?.45:1;diffEl.title=hide?'Mode ini memakai aturan kesulitan khusus.':'';} const pb=$('#pause-typing'); if(pb)pb.textContent=typing.paused?'▶ Resume':'⏸ Pause'; updateHUD();}

function highlightKey(k){const key=k==='Space'?' ':k.toLowerCase();$$('.key.active').forEach(x=>x.classList.remove('active'));const el=$(`.key[data-key="${CSS.escape(key)}"]`);if(el){el.classList.add('active');setTimeout(()=>el.classList.remove('active'),140)}}
function markNext(){ $$('.key.next').forEach(x=>x.classList.remove('next')); if(!state.settings.highlightNext||!typing.active)return; const ch=typing.text[typing.index]; if(!ch)return; const el=$(`.key[data-key="${CSS.escape(ch.toLowerCase())}"]`); if(el)el.classList.add('next');}
function generateText(){ if(typing.mode==='sentence')return sentences[Math.floor(Math.random()*sentences.length)]; if(typing.mode==='symbols')return Array.from({length:25},()=>symbols[Math.floor(Math.random()*symbols.length)]).join(' '); if(typing.mode==='code')return codes[Math.floor(Math.random()*codes.length)]; let list=words[typing.difficulty]||words.easy; if(typing.mode==='sprint')return Array.from({length:15},()=>list[Math.floor(Math.random()*list.length)]).join(' '); if(typing.mode==='endurance')return Array.from({length:80},(_,i)=>{const d=i>30?'hard':i>12?'medium':'easy';const l=words[d];return l[Math.floor(Math.random()*l.length)]}).join(' '); return Array.from({length:Math.ceil(state.settings.textLength/5)},()=>list[Math.floor(Math.random()*list.length)]).join(' ');} 
function generateUniqueText(){let candidate=generateText();let tries=0;while(typing.usedPrompts.includes(candidate)&&tries<120){candidate=generateText();tries++;}if(typing.usedPrompts.includes(candidate)){typing.usedPrompts=[];}typing.usedPrompts.push(candidate);typing.promptCount=(typing.promptCount||0)+1;return candidate;}
function nextPromptInRound(){typing.text=generateUniqueText();typing.index=0;typing.results=[];renderText();markNext();const area=$('#typing-area');if(area){area.classList.remove('flash');void area.offsetWidth;area.classList.add('flash');area.focus();}toast('Soal berikutnya #' + typing.promptCount + ' — timer tetap berjalan.','success');}
function startTyping(mode){ if(mode){typing.mode=mode} typing.difficulty=$('#difficulty')?.value||typing.difficulty; typing.duration=clamp(parseInt($('#duration')?.value||typing.duration,10)||60,10,3600); typing.usedPrompts=[]; typing.promptCount=0; typing.paused=false; typing.results=[]; typing.wpmHistory=[]; typing.lastWpmSample=0; typing.text=generateUniqueText(); typing.index=0; typing.errors=0; typing.typed=0; typing.correct=0; typing.combo=0; typing.lives=3; typing.timeLeft=typing.mode==='sprint'?999:typing.duration; typing.start=Date.now(); typing.active=true; clearInterval(typing.timer); typing.timer=setInterval(tick,1000); renderText(); const tb=$('#timer-bar'); if(tb) tb.style.width='100%'; updateHUD(); markNext(); $('#typing-area')?.focus(); toast('Mulai mode '+typing.mode+' selama '+(typing.mode==='sprint'?'sprint':typing.duration+' detik')+'. Ketik sekarang!','success');}
function stopTyping(reason='Sesi selesai'){ if(!typing.active)return; typing.active=false; clearInterval(typing.timer); const elapsed=Math.max((Date.now()-typing.start)/1000,1); const wpm=((typing.typed/5)/(elapsed/60)); const acc=typing.typed?typing.correct/typing.typed*100:100; const wordsDone=Math.max(1,Math.round(typing.correct/5)); const coinGain=Math.max(1,Math.round(wordsDone*coinMultiplier())); const xpGain=Math.max(1,Math.round((wordsDone*2+wpm*.5)*(acc/100)*xpMultiplier())); addCoins(coinGain); addXP(xpGain); state.stats.totalWords+=wordsDone; state.stats.totalChars+=typing.typed; state.stats.totalTime+=Math.round(elapsed); state.stats.sessions++; state.stats.bestWPM=Math.max(state.stats.bestWPM,wpm); state.stats.bestAccuracy=Math.max(state.stats.bestAccuracy,acc); state.stats.lastPlay=today(); state.history.unshift({date:new Date().toLocaleString('id-ID'),mode:typing.mode,wpm,acc,errors:typing.errors,words:wordsDone}); state.history=state.history.slice(0,30); updateDaily(wordsDone,wpm,acc,typing.mode); checkAchievements(); save(); renderAll(); showSessionModal(reason,wpm,acc,coinGain,xpGain,wordsDone);}
function tick(){ if(!typing.active||typing.paused)return; if(typing.mode!=='sprint'&&typing.mode!=='endurance'){typing.timeLeft--; if(typing.timeLeft<=0)stopTyping('Waktu habis!')} sampleWpmHistory(); updateHUD();}
function renderText(){ const area=$('#typing-area'); if(!area)return; area.innerHTML=typing.text.split('').map((ch,i)=>{const stateClass=i<typing.index?(typing.results[i]?'correct':'wrong'):'';return `<span class="char ${stateClass} ${i===typing.index?'current':''}" data-i="${i}">${ch==='\n'?'↵<br>':ch===' '?'&nbsp;':escapeHTML(ch)}</span>`}).join('');}
function escapeHTML(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function handleKey(e){ if(['Shift','Control','Alt','Meta','CapsLock','Tab'].includes(e.key))return; highlightKey(e.key===' '?'Space':e.key); if(state.settings.sound&&!typing.active)play(e.key==='Backspace'?180:420+Math.random()*160,.035); if(!typing.active||typing.paused)return; if(e.key==='Backspace'){ if(state.settings.strict&&typing.index>0){typing.index--;typing.typed=Math.max(0,typing.typed-1); typing.results[typing.index]=undefined; const el=$(`.char[data-i="${typing.index}"]`); if(el)el.className='char current'} e.preventDefault(); updateHUD(); return; } let key=e.key; if(key==='Enter')key='\n'; if(key.length!==1&&key!=='\n')return; e.preventDefault(); const expected=typing.text[typing.index]; const el=$(`.char[data-i="${typing.index}"]`); typing.typed++; if(key===expected){typing.results[typing.index]=true;typing.correct++;typing.combo++; if(el)el.classList.add('correct'); if(state.settings.sound)play(520+Math.random()*200,.03); const reward=.2*coinMultiplier(); addCoins(reward); }else{typing.results[typing.index]=false;if(state.settings.sound)play(180,.08,'sawtooth'); if(navigator.vibrate)navigator.vibrate(35); typing.errors++;typing.combo=0; if(el)el.classList.add('wrong'); state.fingerErrors[(expected||'?').toLowerCase()]=(state.fingerErrors[(expected||'?').toLowerCase()]||0)+1; if(typing.mode==='endurance'){typing.lives--; if(typing.lives<=0){stopTyping('Nyawa habis!');return}} if(state.settings.strict){updateHUD();return} } typing.index++; if(typing.index>=typing.text.length){ if(typing.mode==='endurance'){typing.text+=' '+generateUniqueText(); renderText()} else if(typing.mode==='sprint'){stopTyping('Sprint selesai!');} else if(typing.timeLeft>0){nextPromptInRound();} else {stopTyping('Waktu habis!');} } else {$$('.char.current').forEach(c=>c.classList.remove('current')); const next=$(`.char[data-i="${typing.index}"]`); if(next)next.classList.add('current')} updateHUD();markNext();}
function updateHUD(){const elapsed=typing.active?Math.max((Date.now()-typing.start)/1000,1):1; const wpm=typing.active?((typing.typed/5)/(elapsed/60)):0; const acc=typing.typed?typing.correct/typing.typed*100:100; const cpm=typing.active?typing.typed/(elapsed/60):0; const set=(id,v)=>{const e=$(id);if(e)e.textContent=v}; set('#hud-wpm',Math.round(wpm));set('#hud-acc',Math.round(acc)+'%');set('#hud-cpm',Math.round(cpm));set('#hud-errors',typing.errors);set('#hud-combo',typing.combo);set('#hud-time',typing.mode==='sprint'?'∞':typing.timeLeft);set('#lives-view','❤'.repeat(Math.max(0,typing.lives))+'♡'.repeat(3-Math.max(0,typing.lives)));$('#coins-footer').textContent=fmt(state.player.coins);const tb=$('#timer-bar');if(tb){tb.style.width=(typing.mode==='sprint'||typing.mode==='endurance')?'100%':clamp((typing.timeLeft/Math.max(1,typing.duration))*100,0,100)+'%';}updateGhostHUD(elapsed);renderWpmSparkline();}
function updateGhostHUD(elapsed){const box=$('#ghost-hud');if(!box)return;if(!typing.ghost||!typing.active){box.classList.add('hidden');return;}box.classList.remove('hidden');const npc=leaderboard.find(x=>x.name===typing.ghost)||{wpm:70,name:typing.ghost};const ghostChars=npc.wpm*5*(elapsed/60);const ghostPct=clamp(ghostChars/Math.max(1,typing.text.length)*100,0,100);const playerPct=clamp(typing.index/Math.max(1,typing.text.length)*100,0,100);const label=$('#ghost-label');const bar=$('#ghost-bar');if(label)label.textContent=`${npc.name}: ${Math.round(ghostPct)}% • Kamu: ${Math.round(playerPct)}%`;if(bar)bar.style.width=ghostPct+'%';}
function sampleWpmHistory(){const elapsed=Math.max((Date.now()-typing.start)/1000,1);if(elapsed-typing.lastWpmSample>=2){const wpm=(typing.typed/5)/(elapsed/60);typing.wpmHistory.push(Math.round(wpm));typing.wpmHistory=typing.wpmHistory.slice(-10);typing.lastWpmSample=elapsed;}}
function renderWpmSparkline(){const c=$('#wpm-spark');if(!c)return;const ctx=c.getContext('2d'),w=c.width,h=c.height;ctx.clearRect(0,0,w,h);const data=typing.wpmHistory.length?typing.wpmHistory:[0];const max=Math.max(10,...data);ctx.strokeStyle='#00D4FF';ctx.lineWidth=2;ctx.beginPath();data.forEach((v,i)=>{const x=i*(w/Math.max(1,data.length-1));const y=h-3-(v/max)*(h-6);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();}
function togglePause(){if(!typing.active)return toast('Tidak ada sesi aktif untuk pause.','error');typing.paused=!typing.paused;const area=$('#typing-area');if(typing.paused){clearInterval(typing.timer);area?.blur();area?.classList.add('paused');toast('Sesi di-pause.','info');}else{clearInterval(typing.timer);typing.timer=setInterval(tick,1000);area?.classList.remove('paused');area?.focus();toast('Sesi dilanjutkan.','success');}const b=$('#pause-typing');if(b)b.textContent=typing.paused?'▶ Resume':'⏸ Pause';}
function showSessionModal(reason,wpm,acc,coins,xp,wordsDone){const score=wpm*(acc/100);const grade=score>=90?'S':score>=70?'A':score>=45?'B':'C';const best=Math.max(1,state.stats.bestWPM);const pct=clamp(wpm/best*100,0,120);const conf=wpm>70?`<div class="confetti">${Array.from({length:28},(_,i)=>`<i style="--x:${(i*37)%100};--d:${i%9}"></i>`).join('')}</div>`:'';openModal(`<div style="position:relative">${conf}<div class="modal-head"><h2>🏁 ${reason}</h2><button class="btn small" data-close>✕</button></div><div class="grid-3"><div class="hud-box"><div class="hud-val gold">${grade}</div><small>Grade</small></div><div class="hud-box"><div class="hud-val gold">${Math.round(wpm)}</div><small>WPM</small></div><div class="hud-box"><div class="hud-val cyan">${Math.round(acc)}%</div><small>Akurasi</small></div></div><br><div class="panel"><div class="metric"><span>Perbandingan vs Best WPM</span><b>${Math.round(pct)}%</b></div><div class="progress"><span style="width:${Math.min(100,pct)}%"></span></div></div><p>Coins <b class="green">+${fmt(coins)}</b> • XP <b class="cyan">+${fmt(xp)}</b> • Kata ${fmt(wordsDone)} • Error ${typing.errors}</p><p class="muted">Tip: ${tips[Math.floor(Math.random()*tips.length)]}</p><button class="btn primary" id="modal-again">Main Lagi</button> <button class="btn" data-page="stats" data-close>Statistik</button></div>`)}

function renderCharts(){ if(!$('#wpmChart'))return; const hist=state.history.slice(0,14).reverse(); const labels=hist.map((h,i)=>'#'+(i+1)); const wpm=hist.map(h=>Math.round(h.wpm)); const acc=hist.map(h=>Math.round(h.acc)); const hasChart=typeof Chart!=='undefined'; ['wpmChart','accChart','errChart','fingerChart'].forEach(id=>{try{if(charts[id]&&charts[id].destroy)charts[id].destroy();}catch(e){}}); if(!hasChart){drawFallback('wpmChart',wpm,'#00D4FF');drawFallback('accChart',acc,'#10B981');drawFallback('errChart',[typing.errors||1,Math.max(1,state.stats.sessions)],'#D4AF37');return} charts.wpmChart=new Chart($('#wpmChart'),{type:'line',data:{labels,datasets:[{label:'WPM',data:wpm,borderColor:'#00D4FF',backgroundColor:'rgba(0,212,255,.15)',tension:.35,fill:true}]},options:chartOpts()}); charts.accChart=new Chart($('#accChart'),{type:'bar',data:{labels,datasets:[{label:'Akurasi',data:acc,backgroundColor:'rgba(16,185,129,.75)'}]},options:chartOpts()}); charts.errChart=new Chart($('#errChart'),{type:'pie',data:{labels:['Typo','Skip','Reverse'],datasets:[{data:[Math.max(1,state.history.reduce((a,h)=>a+h.errors,0)),3,2],backgroundColor:['#EF4444','#D4AF37','#8B5CF6']}]},options:{plugins:{legend:{labels:{color:'#F9FAFB'}}}}});const fd=fingerErrorData();if($('#fingerChart'))charts.fingerChart=new Chart($('#fingerChart'),{type:'bar',data:{labels:fd.labels,datasets:[{label:'Error',data:fd.data,backgroundColor:fd.colors}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#9CA3AF'},grid:{color:'#1F2937'}},y:{ticks:{color:'#9CA3AF'},grid:{color:'#1F2937'}}},plugins:{legend:{labels:{color:'#F9FAFB'}}}}});}

function drawFallback(id,data,color){const c=$('#'+id); if(!c)return; const ctx=c.getContext('2d'),w=c.width=c.clientWidth,h=c.height=c.clientHeight;ctx.clearRect(0,0,w,h);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();data.forEach((v,i)=>{const x=20+i*(w-40)/Math.max(1,data.length-1),y=h-20-(v/Math.max(1,...data))*(h-40);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle='#9CA3AF';ctx.fillText('Chart fallback (CDN offline)',18,18)}

function buyItem(id){const it=shopItems.find(x=>x.id===id); if(!state.owned.includes(id)){ if(state.player.coins<it.price)return toast('Coins belum cukup.','error'); state.player.coins-=it.price; state.owned.push(id); toast('Item dibeli: '+it.name,'success'); } if(it.prop==='booster'){const dur=it.value==='xp'?3600000:it.value==='coin'?1800000:600000; state.boosters[it.value+'Until']=Date.now()+dur; toast('Booster aktif: '+it.name,'success'); } else {state.settings[it.prop]=it.value; if(it.prop==='avatar')state.player.avatar=it.value; toast('Item aktif: '+it.name,'success');} applyTheme(); renderAll();}
function unlockSkill(n,cost){ if(state.skillUnlocked.includes(n))return; if(state.player.xp<cost)return toast('XP belum cukup untuk unlock skill.','error'); state.player.xp-=cost;state.skillUnlocked.push(n);toast('Skill unlocked: '+n,'success');renderAll();}
function prestige(){ if(state.player.level<10&&state.player.coins<50000)return toast('Prestige butuh Lv.10 atau 50.000 coins.','error'); if(!confirm('Prestige akan reset coins dan upgrade, tapi memberi token bonus permanen. Lanjut?'))return; state.player.prestige++; state.player.coins=100; state.player.level=1; state.player.xp=0; state.upgrades.levels={}; toast('💎 Prestige berhasil! Bonus income permanen +10%.','success');checkAchievements();renderAll();}
function openModal(html){$('#modal-container').innerHTML=`<div class="modal-backdrop"><div class="modal">${html}</div></div>`}

function tutorial(){try{localStorage.setItem('typemaster_seen_tutorial','1');}catch(e){window.__typemasterSeenTutorial=true;}openModal(`<div class="modal-head"><h2>📖 Onboarding TypeMaster</h2><button class="btn small" data-close>✕</button></div><div class="tabs">${[1,2,3,4,5,6].map(i=>`<button class="btn small ${i===1?'primary':''}" data-tut="${i}">Layar ${i}</button>`).join('')}</div><div id="tutorial-content"></div><div style="margin-top:14px"><button class="btn primary" id="tutorial-next">Lanjut</button> <button class="btn" data-close>Selesai</button></div>`); renderTutorial(1)}
function renderTutorial(i){const arr=[`<h3>1. Selamat datang!</h3><p>Masukkan nama karakter.</p><input class="text-input" id="tut-name" value="${state.player.name}"><button class="btn small" id="save-name">Simpan Nama</button>`,`<h3>2. Posisi tangan benar</h3>${fingerGuideHTML()}`,`<h3>3. Peta keyboard 10 jari</h3><p>Klik tombol virtual untuk melihat highlight; tombol berikutnya akan bersinar emas saat latihan.</p>`,`<h3>4. Tes kecepatan awal</h3><p>Mulai mode Kata 30 detik untuk kalibrasi level.</p><button class="btn cyan" data-page="practice" data-close id="calibration-start">Mulai Kalibrasi</button>`,`<h3>5. Coin & Upgrade</h3><p>Setiap kata memberi coin. Upgrade Auto-Typer memberi passive income tiap detik.</p>`,`<h3>6. Tujuan harian</h3><p>Pilih target: 500 kata, 60 WPM, 3 mode, dan 95% akurasi. Semua memberi reward.</p>`]; $('#tutorial-content').innerHTML=arr[i-1]; $('#tutorial-next').dataset.next=(i%6)+1; $$('.tabs [data-tut]').forEach(b=>b.classList.toggle('primary',+b.dataset.tut===i));}
function settingsModal(){openModal(`<div class="modal-head"><h2>⚙️ Pengaturan Lengkap</h2><button class="btn small" data-close>✕</button></div><div class="tabs">${['Umum','Tampilan','Audio','Latihan','Keyboard','Notifikasi'].map((t,i)=>`<button class="btn small ${i===0?'primary':''}" data-tab="set-${i}">${t}</button>`).join('')}</div><div id="set-0" class="tab-content active"><div class="setting-row"><b>Nama pengguna</b><input id="set-name" class="text-input" value="${state.player.name}"></div><div class="setting-row"><b>Avatar</b><select id="set-avatar" class="select"><option>🧑‍💻</option><option>🥷</option><option>👑</option><option>🤖</option><option>🦊</option></select></div><div class="setting-row"><b>Bahasa</b><select id="set-lang" class="select"><option value="id">Indonesia</option><option value="en">English</option></select></div><div class="setting-row"><b>Zona Waktu</b><span>Asia/Jakarta</span></div></div><div id="set-1" class="tab-content"><div class="setting-row"><b>Light Mode</b><button class="toggle" data-toggle="theme"></button></div><div class="setting-row"><b>Ukuran font teks</b><select id="set-fontsize" class="select"><option>S</option><option>M</option><option>L</option><option>XL</option></select></div><div class="setting-row"><b>Animasi</b><select id="set-animation" class="select"><option value="full">Penuh</option><option value="minimal">Minimal</option><option value="off">Off</option></select></div><div class="setting-row"><b>Kontras tinggi</b><button class="toggle" data-toggle="contrast"></button></div></div><div id="set-2" class="tab-content"><div class="setting-row"><b>Suara keyboard</b><button class="toggle" data-toggle="sound"></button></div><div class="setting-row"><b>Volume suara tombol</b><input id="set-volume" class="range" type="range" min="0" max="1" step=".01" value="${state.settings.volume}"></div><div class="setting-row"><b>Sound Pack</b><select id="set-soundpack" class="select"><option value="mechanical">Keyboard Mechanical</option><option value="typewriter">Typewriter Classic</option><option value="scifi">Sci-Fi Beep</option><option value="silent">Silent Mode</option></select></div><div class="setting-row"><b>Musik background</b><button class="toggle" data-toggle="music"></button></div><div class="setting-row"><b>Sound effect UI</b><button class="toggle" data-toggle="uiSound"></button></div></div><div id="set-3" class="tab-content"><div class="setting-row"><b>Bahasa teks latihan</b><select id="set-prac-lang" class="select"><option value="id">Indonesia</option><option value="en">Inggris</option><option value="mix">Campuran</option></select></div><div class="setting-row"><b>Difficulty</b><select id="set-diff" class="select"><option value="auto">Auto-adapt</option><option value="manual">Manual</option></select></div><div class="setting-row"><b>Tampilkan WPM live</b><button class="toggle" data-toggle="showWPM"></button></div><div class="setting-row"><b>Mode strict</b><button class="toggle" data-toggle="strict"></button></div><div class="setting-row"><b>Panjang teks default</b><input id="set-length" type="range" min="30" max="180" value="${state.settings.textLength}" class="range"></div></div><div id="set-4" class="tab-content"><div class="setting-row"><b>Layout keyboard</b><select id="set-layout" class="select"><option>QWERTY</option><option>DVORAK</option><option>AZERTY</option></select></div><div class="setting-row"><b>Keyboard virtual</b><button class="toggle" data-toggle="keyboard"></button></div><div class="setting-row"><b>Highlight tombol berikutnya</b><button class="toggle" data-toggle="highlightNext"></button></div><div class="setting-row"><b>Warna jari</b><select class="select"><option>Default</option><option>Custom</option></select></div></div><div id="set-5" class="tab-content"><div class="setting-row"><b>Notifikasi daily challenge</b><button class="toggle on" data-simple-toast="Daily challenge reminder aktif"></button></div><div class="setting-row"><b>Reminder latihan harian</b><input type="time" class="select" value="19:00"></div><div class="setting-row"><b>Leaderboard alert</b><button class="toggle on" data-simple-toast="Leaderboard alert aktif"></button></div></div><button class="btn primary" id="save-settings">Simpan Pengaturan</button> <button class="btn" id="export-save-settings">Export Save</button>`); syncSettingsForm();}
function syncSettingsForm(){const s=state.settings; $('#set-avatar').value=state.player.avatar; $('#set-lang').value=s.language; $('#set-fontsize').value=s.fontSize; $('#set-animation').value=s.animation; $('#set-soundpack').value=s.soundPack; $('#set-diff').value=s.difficulty; $('#set-layout').value=s.layout; $$('.toggle[data-toggle]').forEach(t=>{const k=t.dataset.toggle; t.classList.toggle('on',k==='theme'?s.theme==='light':!!s[k])})}
function saveSettings(){const s=state.settings; state.player.name=$('#set-name')?.value||state.player.name; state.player.avatar=$('#set-avatar')?.value||state.player.avatar; s.language=$('#set-lang')?.value||s.language; s.fontSize=$('#set-fontsize')?.value||s.fontSize; s.animation=$('#set-animation')?.value||s.animation; s.volume=parseFloat($('#set-volume')?.value||s.volume); s.soundPack=$('#set-soundpack')?.value||s.soundPack; s.difficulty=$('#set-diff')?.value||s.difficulty; s.textLength=parseInt($('#set-length')?.value||s.textLength,10); s.layout=$('#set-layout')?.value||s.layout; save();applyTheme();renderAll();toast('Pengaturan disimpan.','success')}
function applyTheme(){let lt=$('#light-theme');if(state.settings.theme==='light'){if(!lt){lt=document.createElement('style');lt.id='light-theme';document.head.appendChild(lt);}lt.textContent=':root{--bg-primary:#F8F9FA;--bg-secondary:#FFFFFF;--bg-card:#FFFFFF;--text-primary:#111827;--text-secondary:#374151;--text-muted:#6B7280;--border:#E5E7EB;--border-glow:rgba(212,175,55,.35);--glow-cyan:rgba(0,130,180,.16)} body{background:#F8F9FA!important;} .panel,.stat-card,.shop-card,.achievement,.mission,.upgrade-card{box-shadow:0 12px 30px rgba(17,24,39,.08)!important;} .typing-area{background:#F0F4F8!important;color:#111827!important;} .hud-val{color:#111827!important;} .hud-box{background:#FFFFFF!important;}';}else if(lt){lt.remove();}document.body.style.filter=state.settings.contrast?'contrast(1.15) saturate(1.2)':'none'; const area=$('#typing-area'); if(area){area.style.fontSize={S:'20px',M:'25px',L:'30px',XL:'36px'}[state.settings.fontSize]||'25px'; area.style.fontFamily=`${state.settings.font}, JetBrains Mono, monospace`;} const kb=$('#keyboard-visualizer'); if(kb){kb.style.borderColor=state.settings.skin==='gold'?'#D4AF37':state.settings.skin==='cyan'?'#00D4FF':state.settings.skin==='matrix'?'#10B981':'#1F2937';}}
function exportSave(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='typemaster-save.json';a.click();URL.revokeObjectURL(a.href);toast('Save diekspor.','success')}
function importSave(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{state=Object.assign(defaultState(),JSON.parse(rd.result));save();renderAll();toast('Import berhasil.','success')}catch(e){toast('File save tidak valid.','error')}};rd.readAsText(f)};inp.click()}
function switchPage(id){currentPage=id;renderCurrentPage();$$('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+id));$$('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===id));renderKeyboard(); if(id==='practice')setTimeout(()=>{$('#typing-area')?.focus();},100); if(id==='stats')setTimeout(renderCharts,80); window.scrollTo({top:0,behavior:'smooth'});}

 if(b.id==='mobile-menu'){$('.navbar').classList.toggle('nav-open');return;} if(b.dataset.page){switchPage(b.dataset.page); if(b.hasAttribute('data-close'))closeModal()}

','success')} if(b.dataset.tab){$$('.tab-content').forEach(x=>x.classList.remove('active'));$('#'+b.dataset.tab).classList.add('active');$$('[data-tab]').forEach(x=>x.classList.remove('primary'));b.classList.add('primary')} if(b.dataset.toggle){const k=b.dataset.toggle;if(k==='theme')state.settings.theme=state.settings.theme==='light'?'dark':'light';else state.settings[k]=!state.settings[k];b.classList.toggle('on',k==='theme'?state.settings.theme==='light':state.settings[k]); if(k==='soundPack'&&state.settings.soundPack==='silent')state.settings.sound=false; save();applyTheme();toast('Toggle '+k+' diperbarui.','success')} if(b.dataset.simpleToast){b.classList.toggle('on');toast(b.dataset.simpleToast,'success')} if(b.id==='save-settings')saveSettings(); if(b.id==='modal-again'){closeModal();switchPage('practice');setTimeout(()=>startTyping(),40)} }
function handleInput(e){if(e.target.id==='duration'){if(!e.target.value)return;let v=parseInt(e.target.value,10);if(Number.isNaN(v)){return;}v=clamp(v,10,3600);e.target.value=v;typing.duration=v;if(!typing.active){typing.timeLeft=v;updateHUD();}}}
