<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeMaster: Idle Typing Empire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
/* =========================================================
   TypeMaster CSS — expanded readable version.
   Bagian ini sengaja tidak dikompres: tema dark elegant,
   scanline CRT, particle background, navbar, cards, arena,
   keyboard virtual, toko, statistik, modal, toast, responsive.
   ========================================================= */

    :root{

      --bg-primary:#080B14;
--bg-secondary:#0D1117;
--bg-card:#111827;
--accent-gold:#D4AF37;
--accent-gold-light:#F0D060;
--accent-cyan:#00D4FF;
--accent-purple:#8B5CF6;
--accent-green:#10B981;
--accent-red:#EF4444;
--text-primary:#F9FAFB;
--text-secondary:#9CA3AF;
--text-muted:#4B5563;
--border:#1F2937;
--border-glow:rgba(212,175,55,.3);
--glow-cyan:rgba(0,212,255,.2);
--card-shadow:0 18px 50px rgba(0,0,0,.42);
--radius:18px;
--nav-h:76px
    }

    *{
box-sizing:border-box}
 html{
scroll-behavior:smooth}
 body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top left,rgba(0,212,255,.09),transparent 32%),radial-gradient(circle at top right,rgba(212,175,55,.08),transparent 35%),var(--bg-primary);
color:var(--text-primary);
font-family:Inter,system-ui,sans-serif;
overflow-x:hidden}

    body::before{
content:"";
position:fixed;
inset:0;
z-index:-3;
background:linear-gradient(rgba(255,255,255,.021) 50%,transparent 50%);
background-size:100% 4px;
pointer-events:none;
mix-blend-mode:screen;
opacity:.22}
 body::after{
content:"";
position:fixed;
inset:0;
z-index:-4;
background-image:radial-gradient(circle,#fff 1px,transparent 1.4px),radial-gradient(circle,var(--accent-cyan) 1px,transparent 1.4px),radial-gradient(circle,var(--accent-gold) 1px,transparent 1.4px);
background-size:190px 190px,270px 270px,350px 350px;
background-position:0 0,70px 90px,140px 50px;
animation:stars 55s linear infinite;
opacity:.24}
@keyframes stars{
to{
background-position:900px 500px,700px 650px,1000px 700px}
}

    .hidden{
display:none!important}
.muted{
color:var(--text-secondary)}
.gold{
color:var(--accent-gold)}
.cyan{
color:var(--accent-cyan)}
.green{
color:var(--accent-green)}
.red{
color:var(--accent-red)}

    button,input,select,textarea{
font:inherit}
 button{
border:0;
cursor:pointer;
color:var(--text-primary)}

    .btn{
position:relative;
overflow:hidden;
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
padding:10px 15px;
border:1px solid var(--border);
border-radius:14px;
background:linear-gradient(180deg,#192234,#0e1522);
box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
transition:.2s}
.btn:hover{
transform:translateY(-1px);
border-color:var(--border-glow);
box-shadow:0 0 24px var(--border-glow)}
.btn.primary{
background:linear-gradient(135deg,var(--accent-gold),#8b6a16);
color:#111;
font-weight:900}
.btn.cyan{
background:linear-gradient(135deg,var(--accent-cyan),#0369a1);
font-weight:800}
.btn.green{
background:linear-gradient(135deg,var(--accent-green),#065f46);
font-weight:800}
.btn.red{
background:linear-gradient(135deg,var(--accent-red),#7f1d1d);
font-weight:800}
.btn.small{
padding:7px 10px;
border-radius:11px;
font-size:13px}
.btn:disabled{
opacity:.45;
cursor:not-allowed;
filter:grayscale(.4)}
.ripple{
position:absolute;
border-radius:999px;
background:rgba(255,255,255,.35);
transform:scale(0);
animation:ripple .55s ease-out;
pointer-events:none}
@keyframes ripple{
to{
transform:scale(4);
opacity:0}
}

    #loading-screen{
position:fixed;
inset:0;
background:var(--bg-primary);
z-index:9999;
display:grid;
place-items:center;
transition:.45s}
.loader{
text-align:center}
.loader-logo{
font-family:"Cinzel Decorative";
font-size:44px;
color:var(--accent-gold);
text-shadow:0 0 28px var(--border-glow);
animation:pulse 1.5s infinite}
.loader-bar{
width:320px;
height:9px;
background:#101827;
border:1px solid var(--border);
border-radius:999px;
overflow:hidden;
margin-top:22px}
.loader-bar span{
display:block;
height:100%;
width:45%;
background:linear-gradient(90deg,transparent,var(--accent-cyan),var(--accent-gold),transparent);
animation:load 1.1s infinite}
@keyframes load{
from{
transform:translateX(-120%)}
to{
transform:translateX(230%)}
}
@keyframes pulse{
50%{
filter:brightness(1.5);
transform:scale(1.02)}
}

    .app{
min-height:100vh}
.navbar{
height:var(--nav-h);
position:sticky;
top:0;
z-index:50;
background:rgba(8,11,20,.84);
backdrop-filter:blur(18px);
display:grid;
grid-template-columns:280px 1fr 330px;
align-items:center;
padding:0 22px;
border-bottom:1px solid var(--border)}
.brand{
display:flex;
align-items:center;
gap:12px}
.brand-title{
font-family:"Cinzel Decorative";
letter-spacing:1px;
color:var(--accent-gold);
text-shadow:0 0 22px var(--border-glow);
font-size:22px;
animation:brandglow 3s infinite}
.brand-sub{
font-family:Rajdhani;
color:var(--text-secondary);
font-size:12px;
margin-top:2px}
@keyframes brandglow{
50%{
text-shadow:0 0 35px rgba(240,208,96,.65)}
}
.nav-menu{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap}
.nav-btn{
background:transparent;
border:1px solid transparent;
color:var(--text-secondary);
border-radius:13px;
padding:10px 12px;
font-family:Rajdhani;
font-weight:700;
font-size:16px}
.nav-btn:hover,.nav-btn.active{
color:var(--text-primary);
border-color:var(--border-glow);
background:rgba(212,175,55,.08);
box-shadow:0 0 22px rgba(212,175,55,.12)}
.profile{
display:flex;
align-items:center;
justify-content:flex-end;
gap:10px}
.avatar{
width:42px;
height:42px;
border-radius:50%;
display:grid;
place-items:center;
background:linear-gradient(135deg,var(--accent-purple),var(--accent-cyan));
font-size:22px;
border:2px solid rgba(255,255,255,.15)}
.level-badge{
font-family:Rajdhani;
background:rgba(212,175,55,.14);
border:1px solid var(--border-glow);
border-radius:999px;
padding:3px 9px;
color:var(--accent-gold)}

    .hero-stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
padding:18px 22px}
.stat-card,.panel,.shop-card,.achievement,.mission,.upgrade-card{
background:linear-gradient(180deg,rgba(17,24,39,.95),rgba(13,17,23,.95));
border:1px solid var(--border);
border-radius:var(--radius);
box-shadow:var(--card-shadow)}
.stat-card{
padding:17px;
position:relative;
overflow:hidden}
.stat-card::after{
content:"";
position:absolute;
inset:auto -30% -70% auto;
width:180px;
height:180px;
background:radial-gradient(circle,var(--glow-cyan),transparent 70%)}
.stat-top{
display:flex;
align-items:center;
justify-content:space-between}
.stat-icon{
font-size:32px;
filter:drop-shadow(0 0 12px var(--glow-cyan))}
.stat-value{
font-family:Rajdhani;
font-size:34px;
font-weight:800;
margin-top:8px}
.trend{
font-size:12px;
color:var(--accent-green)}

    .layout{
display:grid;
grid-template-columns:260px minmax(0,1fr) 300px;
gap:18px;
padding:0 22px 86px}
.sidebar,.rightbar{
display:flex;
flex-direction:column;
gap:16px}
.panel{
padding:16px}
.panel h3,.panel h2{
margin:0 0 12px;
font-family:Rajdhani;
letter-spacing:.5px}
.side-link{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
margin:7px 0;
padding:10px;
border:1px solid transparent;
background:rgba(255,255,255,.025);
border-radius:12px;
color:var(--text-secondary)}
.side-link:hover,.side-link.active{
border-color:var(--border-glow);
color:var(--text-primary);
background:rgba(212,175,55,.08)}
.progress{
height:12px;
background:#070b13;
border-radius:999px;
overflow:hidden;
border:1px solid var(--border)}
.progress>span{
display:block;
height:100%;
width:0;
background:linear-gradient(90deg,var(--accent-cyan),var(--accent-purple),var(--accent-gold),var(--accent-cyan));
background-size:220% 100%;
animation:shimmer 2s linear infinite;
border-radius:999px}
@keyframes shimmer{
to{
background-position:220% 0}
}

    .main{
min-width:0}
.page{
display:none;
animation:fade .25s ease}
.page.active{
display:block}
@keyframes fade{
from{
opacity:0;
transform:translateY(6px)}
to{
opacity:1;
transform:none}
}
.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px}
.grid-3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px}
.hero-panel{
padding:24px;
background:linear-gradient(130deg,rgba(17,24,39,.98),rgba(13,17,23,.97),rgba(139,92,246,.12));
border:1px solid var(--border-glow);
border-radius:24px;
box-shadow:var(--card-shadow);
position:relative;
overflow:hidden}
.hero-panel h1{
font-family:"Cinzel Decorative";
font-size:34px;
margin:0 0 8px;
color:var(--accent-gold)}
.quick-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:18px}
.metric-list{
display:grid;
gap:10px}
.metric{
display:flex;
justify-content:space-between;
border-bottom:1px dashed var(--border);
padding-bottom:8px}
.leader-entry{
display:grid;
grid-template-columns:32px 1fr auto;
gap:9px;
align-items:center;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,.05)}

    .typing-hud{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
margin-bottom:14px}
.hud-box{
text-align:center;
padding:12px;
border-radius:15px;
background:rgba(17,24,39,.85);
border:1px solid var(--border)}
.hud-val{
font-family:Rajdhani;
font-size:28px;
font-weight:800}
.mode-tabs{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:14px}
.typing-area{
padding:22px;
border-radius:22px;
background:#070b13;
border:1px solid var(--border);
min-height:200px;
font-family:"JetBrains Mono",monospace;
font-size:25px;
line-height:1.75;
outline:0}
.typing-area .char{
border-radius:4px;
padding:0 1px}
.typing-area .char.correct{
color:#07110d;
background:var(--accent-green)}
.typing-area .char.wrong{
color:#fff;
background:var(--accent-red)}
.typing-area .char.current{
box-shadow:0 2px 0 var(--accent-gold);
background:rgba(212,175,55,.14)}
.typing-controls{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
margin:14px 0}
.select,.text-input{
background:#080d17;
border:1px solid var(--border);
border-radius:12px;
color:var(--text-primary);
padding:10px}
.text-input{
width:100%}
.lives{
letter-spacing:4px;
color:var(--accent-red)}

    .keyboard{
position:fixed;
left:50%;
bottom:12px;
transform:translateX(-50%);
z-index:45;
width:min(920px,calc(100vw - 28px));
background:rgba(8,11,20,.9);
backdrop-filter:blur(14px);
border:1px solid var(--border);
border-radius:18px;
padding:12px;
box-shadow:0 0 40px rgba(0,0,0,.45)}
.kb-row{
display:flex;
gap:6px;
justify-content:center;
margin:5px 0}
.key{
min-width:42px;
height:38px;
border-radius:10px;
border:1px solid #263244;
background:linear-gradient(180deg,#162033,#0b111d);
display:grid;
place-items:center;
font-family:"JetBrains Mono";
font-size:13px;
color:var(--text-secondary);
transition:.08s}
.key.space{
width:260px}
.key.active{
transform:translateY(2px) scale(.96);
background:var(--accent-cyan);
color:#001016;
box-shadow:0 0 22px var(--accent-cyan)}
.key.next{
border-color:var(--accent-gold);
box-shadow:0 0 15px var(--border-glow)}
.finger-l1{
--finger:#ef4444}
.finger-l2{
--finger:#f97316}
.finger-l3{
--finger:#eab308}
.finger-l4{
--finger:#22c55e}
.finger-l5{
--finger:#14b8a6}
.finger-r1{
--finger:#06b6d4}
.finger-r2{
--finger:#3b82f6}
.finger-r3{
--finger:#8b5cf6}
.finger-r4{
--finger:#d946ef}
.finger-r5{
--finger:#ec4899}
.key{
box-shadow:inset 0 -2px 0 var(--finger,transparent)}

    .shop-grid,.ach-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px}
.shop-card,.upgrade-card,.achievement,.mission{
padding:14px}
.shop-card.owned,.achievement.unlocked{
border-color:rgba(16,185,129,.55);
box-shadow:0 0 20px rgba(16,185,129,.09)}
.price{
font-family:Rajdhani;
font-weight:800;
color:var(--accent-gold)}
.skill-tree{
display:grid;
gap:16px;
place-items:center;
overflow:auto;
padding:12px}
.skill-row{
display:flex;
gap:14px;
justify-content:center}
.skill-node{
padding:12px 15px;
border:1px solid var(--border);
border-radius:16px;
background:#0b111d;
text-align:center;
min-width:130px}
.skill-node.unlocked{
border-color:var(--accent-purple);
box-shadow:0 0 20px rgba(139,92,246,.2)}
.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px}
.canvas-wrap{
height:260px;
position:relative}
.heatmap{
display:grid;
grid-template-columns:repeat(14,1fr);
gap:5px}
.heat{
height:24px;
border-radius:6px;
background:rgba(16,185,129,.25);
font-size:10px;
display:grid;
place-items:center}
.heat.hot{
background:rgba(239,68,68,.7)}
.footer{
position:fixed;
left:0;
right:0;
bottom:0;
z-index:44;
background:rgba(8,11,20,.88);
backdrop-filter:blur(12px);
border-top:1px solid var(--border);
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
padding:9px 22px;
font-size:13px}
.toast-container{
position:fixed;
right:18px;
bottom:92px;
z-index:200;
display:grid;
gap:10px}
.toast{
min-width:250px;
max-width:360px;
padding:13px 14px;
border-radius:15px;
background:rgba(17,24,39,.97);
border:1px solid var(--border-glow);
box-shadow:0 18px 40px rgba(0,0,0,.45);
animation:toastIn .25s}
.toast.success{
border-color:rgba(16,185,129,.55)}
.toast.error{
border-color:rgba(239,68,68,.55)}
@keyframes toastIn{
from{
opacity:0;
transform:translateX(40px)}
to{
opacity:1;
transform:none}
}

    .modal-backdrop{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
z-index:150;
display:grid;
place-items:center;
padding:18px}
.modal{
width:min(850px,96vw);
max-height:88vh;
overflow:auto;
background:linear-gradient(180deg,#111827,#0D1117);
border:1px solid var(--border-glow);
border-radius:24px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
padding:20px}
.modal-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px}
.tabs{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:12px}
.tab-content{
display:none}
.tab-content.active{
display:block}
.setting-row{
display:grid;
grid-template-columns:220px 1fr;
gap:14px;
align-items:center;
margin:10px 0;
padding:9px;
border-bottom:1px dashed var(--border)}
.range{
width:100%}
.toggle{
width:48px;
height:26px;
border-radius:999px;
background:#374151;
position:relative;
border:1px solid var(--border)}
.toggle::after{
content:"";
width:20px;
height:20px;
border-radius:50%;
background:#fff;
position:absolute;
top:2px;
left:3px;
transition:.2s}
.toggle.on{
background:var(--accent-green)}
.toggle.on::after{
left:23px}
.finger-map{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px}
.hand{
padding:14px;
background:#080d17;
border:1px solid var(--border);
border-radius:16px}
.hand-row{
display:flex;
justify-content:space-between;
margin:8px 0}
.badge{
display:inline-flex;
align-items:center;
gap:5px;
padding:4px 8px;
border-radius:999px;
background:rgba(0,212,255,.1);
border:1px solid rgba(0,212,255,.25);
color:var(--accent-cyan);
font-size:12px}
.npc-card{
display:flex;
gap:10px;
align-items:center;
padding:11px;
border:1px solid var(--border);
border-radius:14px;
background:#0b111d;
margin:8px 0}
.social-card{
padding:14px;
border:1px dashed var(--border-glow);
border-radius:16px;
background:rgba(212,175,55,.05)}

    @media(max-width:1180px){
.navbar{
grid-template-columns:1fr}
.nav-menu,.profile{
justify-content:flex-start}
.navbar{
height:auto;
padding:12px}
.layout{
grid-template-columns:1fr}
.sidebar,.rightbar{
display:none}
.hero-stats,.grid-2,.grid-3,.chart-grid{
grid-template-columns:1fr 1fr}
.keyboard{
position:static;
transform:none;
margin:18px auto 76px}
.footer{
grid-template-columns:1fr}
}
@media(max-width:720px){
.hero-stats,.grid-2,.grid-3,.typing-hud,.chart-grid{
grid-template-columns:1fr}
.typing-area{
font-size:20px}
.key{
min-width:26px}
.key.space{
width:130px}
.setting-row{
grid-template-columns:1fr}
.hero-panel h1{
font-size:26px}
}

  
/* =========================================================
   FIX: Typing prompt wrapping
   Soal latihan harus tetap berada di dalam kartu/kolom.
   Setiap karakter dibuat inline-block agar browser bisa
   membungkus teks antar karakter walaupun spasi dirender
   sebagai non-breaking space untuk kebutuhan visual trainer.
   ========================================================= */
.typing-area{
  max-width:100%;
  overflow-x:hidden;
  overflow-y:auto;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  word-break:break-word;
}
.typing-area .char{
  display:inline-block;
  vertical-align:baseline;
}

</style>
</head>
<body>
  <div id="loading-screen"><div class="loader"><div class="loader-logo">⌨ TYPEMASTER</div><div class="muted">Idle Typing Empire sedang dimuat...</div><div class="loader-bar"><span></span></div></div></div>
  <div id="app" class="app hidden">
    <nav class="navbar">
      <div class="brand"><div class="avatar">⌨</div><div><div class="brand-title">TYPEMASTER</div><div class="brand-sub">Idle Typing Empire</div></div></div>
      <div class="nav-menu" id="top-nav"></div>
      <div class="profile"><div class="avatar" id="avatar-view">🧑‍💻</div><div><b id="player-name-view">Player</b><div><span class="level-badge" id="level-view">Lv.1</span></div></div><button class="btn small" id="notify-btn">🔔</button><button class="btn small" id="settings-btn">⚙️</button></div>
    </nav>
    <section class="hero-stats" id="hero-stats"></section>
    <div class="layout">
      <aside class="sidebar">
        <div class="panel"><h3>🧭 Navigasi</h3><div id="side-nav"></div></div>
        <div class="panel"><h3>📈 Progress Level</h3><div class="metric"><span>XP</span><span id="xp-label">0/100</span></div><div class="progress"><span id="xp-bar"></span></div><button class="btn small primary" style="margin-top:10px;width:100%" id="open-tutorial">📖 Tutorial</button></div>
        <div class="panel"><h3>🌳 Skill Tree</h3><div id="mini-skills"></div><button class="btn small cyan" style="margin-top:10px;width:100%" data-page="achievements">Lihat Skill</button></div>
      </aside>
      <main class="main" id="main-content">
        <section id="page-home" class="page active"></section>
        <section id="page-practice" class="page"></section>
        <section id="page-arena" class="page"></section>
        <section id="page-shop" class="page"></section>
        <section id="page-stats" class="page"></section>
        <section id="page-achievements" class="page"></section>
      </main>

function load(){try{const raw=localStorage.getItem('typemaster_save_v1'); if(raw){const s=Object.assign(defaultState(),JSON.parse(raw)); s.player=Object.assign(defaultState().player,s.player||{}); s.stats=Object.assign(defaultState().stats,s.stats||{}); s.settings=Object.assign(defaultState().settings,s.settings||{}); if(s.dailyMissions?.date!==today()) s.dailyMissions={date:today(),completed:[],progress:{words:0,wpm60:0,modes:[],acc95:0}}; return s;}}catch(e){} return defaultState();}

function toast(msg,type='info'){const t=document.createElement('div');t.className='toast '+type;t.innerHTML=msg;$('#toast-container').appendChild(t);setTimeout(()=>{t.style.opacity=0;t.style.transform='translateX(40px)';setTimeout(()=>t.remove(),250)},3600)}
function play(freq=420,dur=.035,type='square'){if((!state.settings.sound && !state.settings.uiSound)||state.settings.soundPack==='silent')return; try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=state.settings.soundPack==='scifi'?'sine':type;o.frequency.value=state.settings.soundPack==='typewriter'?freq*.65:freq;g.gain.value=(state.settings.volume||.35)*.05;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}catch(e){}}
function coinMultiplier(){let m=1+((state.upgrades.levels.mech||0)*.1); if(Date.now()<state.boosters.coinUntil)m*=2; return m}
function xpMultiplier(){let m=1+((state.upgrades.levels.dict||0)*.05); if(Date.now()<state.boosters.xpUntil)m*=2; return m}
function globalIncomeMultiplier(){let m=1+state.player.prestige*.1; if(state.upgrades.levels.studio)m*=Math.pow(2,state.upgrades.levels.studio); if(state.upgrades.levels.agency)m*=Math.pow(5,state.upgrades.levels.agency); return m}
function idleIncome(){return upgrades.reduce((t,u)=>t+(u.baseIncome||0)*(state.upgrades.levels[u.id]||0)*globalIncomeMultiplier(),0)}
function addCoins(n){state.player.coins+=n;state.stats.totalCoins+=n;}
function addXP(n){state.player.xp+=n; let leveled=false; while(state.player.xp>=xpForLevel(state.player.level)){state.player.xp-=xpForLevel(state.player.level);state.player.level++;leveled=true;toast('✨ Level naik ke <b>Lv.'+state.player.level+'</b>!','success');play(800,.12,'triangle')} if(leveled)renderAll();}
function checkAchievements(){achievements.forEach(a=>{if(!state.achievements.unlocked.includes(a.id)&&a.check(state)){state.achievements.unlocked.push(a.id);toast(`🏆 Achievement unlocked: <b>${a.name}</b>`,'success');play(900,.16,'triangle')}})}
function completeMission(id,msg){if(!state.dailyMissions.completed.includes(id)){state.dailyMissions.completed.push(id);toast('🎁 Misi selesai: '+msg,'success'); if(id==='words'){addCoins(100)} if(id==='wpm60'){addXP(200)} if(id==='modes'){state.player.gems+=1;toast('🎁 Loot Box dibuka: +1 gems','success')} if(id==='acc95'){state.player.gems+=50}}}
function updateDaily(words,wpm,acc,mode){const p=state.dailyMissions.progress;p.words+=(words||0); if(wpm>=60)p.wpm60=1; if(acc>=95)p.acc95=1; if(mode&&!p.modes.includes(mode))p.modes.push(mode); if(p.words>=500)completeMission('words','Ketik 500 kata hari ini → +100 coins'); if(p.wpm60)completeMission('wpm60','Capai 60 WPM → +200 XP'); if(p.modes.length>=3)completeMission('modes','Selesaikan 3 mode berbeda → Loot Box'); if(p.acc95)completeMission('acc95','Akurasi 95%+ → +50 gems')}
function animateNumber(el,val,suffix=''){if(!el)return;const old=parseFloat(el.dataset.val||0),start=performance.now(),dur=500;function step(t){const p=clamp((t-start)/dur,0,1);const v=old+(val-old)*(1-Math.pow(1-p,3));el.textContent=fmt(v)+suffix;if(p<1)requestAnimationFrame(step);else{el.dataset.val=val;el.textContent=fmt(val)+suffix}}requestAnimationFrame(step)}

function renderKeyboard(){if(!state.settings.keyboard||currentPage!=='practice'){$('#keyboard-visualizer').classList.add('hidden');return} $('#keyboard-visualizer').classList.remove('hidden'); const rows=['1234567890-=', 'qwertyuiop[]', 'asdfghjkl;\\', 'zxcvbnm,./']; const fingerMap={q:'l1',a:'l1',z:'l1',w:'l2',s:'l2',x:'l2',e:'l3',d:'l3',c:'l3',r:'l4',f:'l4',v:'l4',t:'l4',g:'l4',b:'l4',y:'r1',h:'r1',n:'r1',u:'r1',j:'r1',m:'r1',i:'r2',k:'r2',',':'r2',o:'r3',l:'r3','.':'r3',p:'r4',';':'r4','/':'r4'}; $('#keyboard-visualizer').innerHTML=rows.map(r=>`<div class="kb-row">${r.split('').map(k=>`<div class="key finger-${fingerMap[k]||'r5'}" data-key="${k}">${k.toUpperCase()}</div>`).join('')}</div>`).join('')+`<div class="kb-row"><div class="key space finger-l5" data-key=" ">SPACE</div></div>`;}
function highlightKey(k){const key=k==='Space'?' ':k.toLowerCase();$$('.key.active').forEach(x=>x.classList.remove('active'));const el=$(`.key[data-key="${CSS.escape(key)}"]`);if(el){el.classList.add('active');setTimeout(()=>el.classList.remove('active'),140)}}
function markNext(){ $$('.key.next').forEach(x=>x.classList.remove('next')); if(!state.settings.highlightNext||!typing.active)return; const ch=typing.text[typing.index]; if(!ch)return; const el=$(`.key[data-key="${CSS.escape(ch.toLowerCase())}"]`); if(el)el.classList.add('next');}
function generateText(){ if(typing.mode==='sentence')return sentences[Math.floor(Math.random()*sentences.length)]; if(typing.mode==='symbols')return Array.from({length:25},()=>symbols[Math.floor(Math.random()*symbols.length)]).join(' '); if(typing.mode==='code')return codes[Math.floor(Math.random()*codes.length)]; let list=words[typing.difficulty]||words.easy; if(typing.mode==='sprint')return Array.from({length:15},()=>list[Math.floor(Math.random()*list.length)]).join(' '); if(typing.mode==='endurance')return Array.from({length:80},(_,i)=>{const d=i>30?'hard':i>12?'medium':'easy';const l=words[d];return l[Math.floor(Math.random()*l.length)]}).join(' '); return Array.from({length:Math.ceil(state.settings.textLength/5)},()=>list[Math.floor(Math.random()*list.length)]).join(' ');} 
function generateUniqueText(){let candidate=generateText();let tries=0;while(typing.usedPrompts.includes(candidate)&&tries<120){candidate=generateText();tries++;}if(typing.usedPrompts.includes(candidate)){typing.usedPrompts=[];}typing.usedPrompts.push(candidate);typing.promptCount=(typing.promptCount||0)+1;return candidate;}
function nextPromptInRound(){typing.text=generateUniqueText();typing.index=0;renderText();markNext();const area=$('#typing-area');if(area)area.focus();toast('Soal berikutnya #' + typing.promptCount + ' — timer tetap berjalan.','success');}
function startTyping(mode){ if(mode){typing.mode=mode} typing.difficulty=$('#difficulty')?.value||typing.difficulty; typing.duration=clamp(parseInt($('#duration')?.value||typing.duration,10)||60,10,3600); typing.usedPrompts=[]; typing.promptCount=0; typing.text=generateUniqueText(); typing.index=0; typing.errors=0; typing.typed=0; typing.correct=0; typing.combo=0; typing.lives=3; typing.timeLeft=typing.mode==='sprint'?999:typing.duration; typing.start=Date.now(); typing.active=true; clearInterval(typing.timer); typing.timer=setInterval(tick,1000); renderText(); updateHUD(); markNext(); $('#typing-area')?.focus(); toast('Mulai mode '+typing.mode+' selama '+(typing.mode==='sprint'?'sprint':typing.duration+' detik')+'. Ketik sekarang!','success');}
function stopTyping(reason='Sesi selesai'){ if(!typing.active)return; typing.active=false; clearInterval(typing.timer); const elapsed=Math.max((Date.now()-typing.start)/1000,1); const wpm=((typing.typed/5)/(elapsed/60)); const acc=typing.typed?typing.correct/typing.typed*100:100; const wordsDone=Math.max(1,Math.round(typing.correct/5)); const coinGain=Math.max(1,Math.round(wordsDone*coinMultiplier())); const xpGain=Math.max(1,Math.round((wordsDone*2+wpm*.5)*(acc/100)*xpMultiplier())); addCoins(coinGain); addXP(xpGain); state.stats.totalWords+=wordsDone; state.stats.totalChars+=typing.typed; state.stats.totalTime+=Math.round(elapsed); state.stats.sessions++; state.stats.bestWPM=Math.max(state.stats.bestWPM,wpm); state.stats.bestAccuracy=Math.max(state.stats.bestAccuracy,acc); state.stats.lastPlay=today(); state.history.unshift({date:new Date().toLocaleString('id-ID'),mode:typing.mode,wpm,acc,errors:typing.errors,words:wordsDone}); state.history=state.history.slice(0,30); updateDaily(wordsDone,wpm,acc,typing.mode); checkAchievements(); save(); renderAll(); showSessionModal(reason,wpm,acc,coinGain,xpGain,wordsDone);}
function tick(){ if(!typing.active)return; if(typing.mode!=='sprint'&&typing.mode!=='endurance'){typing.timeLeft--; if(typing.timeLeft<=0)stopTyping('Waktu habis!')} updateHUD();}
function renderText(){ const area=$('#typing-area'); if(!area)return; area.innerHTML=typing.text.split('').map((ch,i)=>`<span class="char ${i<typing.index?(ch._dummy?'':''):''} ${i===typing.index?'current':''}" data-i="${i}">${ch==='\n'?'↵<br>':ch===' '?'&nbsp;':escapeHTML(ch)}</span>`).join('');}
function escapeHTML(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function handleKey(e){ if(['Shift','Control','Alt','Meta','CapsLock','Tab'].includes(e.key))return; highlightKey(e.key===' '?'Space':e.key); if(state.settings.sound)play(e.key==='Backspace'?180:420+Math.random()*160,.035); if(!typing.active)return; if(e.key==='Backspace'){ if(state.settings.strict&&typing.index>0){typing.index--;typing.typed=Math.max(0,typing.typed-1); const el=$(`.char[data-i="${typing.index}"]`); if(el)el.className='char current'} e.preventDefault(); updateHUD(); return; } let key=e.key; if(key==='Enter')key='\n'; if(key.length!==1&&key!=='\n')return; e.preventDefault(); const expected=typing.text[typing.index]; const el=$(`.char[data-i="${typing.index}"]`); typing.typed++; if(key===expected){typing.correct++;typing.combo++; if(el)el.classList.add('correct'); const reward=.2*coinMultiplier(); addCoins(reward); }else{typing.errors++;typing.combo=0; if(el)el.classList.add('wrong'); state.fingerErrors[(expected||'?').toLowerCase()]=(state.fingerErrors[(expected||'?').toLowerCase()]||0)+1; if(typing.mode==='endurance'){typing.lives--; if(typing.lives<=0){stopTyping('Nyawa habis!');return}} if(state.settings.strict){updateHUD();return} } typing.index++; if(typing.index>=typing.text.length){ if(typing.mode==='endurance'){typing.text+=' '+generateUniqueText(); renderText()} else if(typing.mode==='sprint'){stopTyping('Sprint selesai!');} else if(typing.timeLeft>0){nextPromptInRound();} else {stopTyping('Waktu habis!');} } else {$$('.char.current').forEach(c=>c.classList.remove('current')); const next=$(`.char[data-i="${typing.index}"]`); if(next)next.classList.add('current')} updateHUD();markNext();}
function updateHUD(){const elapsed=typing.active?Math.max((Date.now()-typing.start)/1000,1):1; const wpm=typing.active?((typing.typed/5)/(elapsed/60)):0; const acc=typing.typed?typing.correct/typing.typed*100:100; const cpm=typing.active?typing.typed/(elapsed/60):0; const set=(id,v)=>{const e=$(id);if(e)e.textContent=v}; set('#hud-wpm',Math.round(wpm));set('#hud-acc',Math.round(acc)+'%');set('#hud-cpm',Math.round(cpm));set('#hud-errors',typing.errors);set('#hud-combo',typing.combo);set('#hud-time',typing.mode==='sprint'?'∞':typing.timeLeft);set('#lives-view','❤'.repeat(Math.max(0,typing.lives))+'♡'.repeat(3-Math.max(0,typing.lives)));$('#coins-footer').textContent=fmt(state.player.coins);}
function showSessionModal(reason,wpm,acc,coins,xp,wordsDone){openModal(`<div class="modal-head"><h2>🏁 ${reason}</h2><button class="btn small" data-close>✕</button></div><div class="grid-3"><div class="hud-box"><div class="hud-val gold">${Math.round(wpm)}</div><small>WPM</small></div><div class="hud-box"><div class="hud-val cyan">${Math.round(acc)}%</div><small>Akurasi</small></div><div class="hud-box"><div class="hud-val green">+${fmt(coins)}</div><small>Coins</small></div></div><p>XP +${fmt(xp)} • Kata ${fmt(wordsDone)} • Error ${typing.errors}</p><p class="muted">Tip: ${tips[Math.floor(Math.random()*tips.length)]}</p><button class="btn primary" id="modal-again">Main Lagi</button> <button class="btn" data-page="stats" data-close>Statistik</button>`)}
function renderCharts(){ const hist=state.history.slice(0,14).reverse(); const labels=hist.map((h,i)=>'#'+(i+1)); const wpm=hist.map(h=>Math.round(h.wpm)); const acc=hist.map(h=>Math.round(h.acc)); const hasChart=typeof Chart!=='undefined'; ['wpmChart','accChart','errChart'].forEach(id=>{if(charts[id])charts[id].destroy&&charts[id].destroy()}); if(!hasChart){drawFallback('wpmChart',wpm,'#00D4FF');drawFallback('accChart',acc,'#10B981');drawFallback('errChart',[typing.errors||1,Math.max(1,state.stats.sessions)],'#D4AF37');return} charts.wpmChart=new Chart($('#wpmChart'),{type:'line',data:{labels,datasets:[{label:'WPM',data:wpm,borderColor:'#00D4FF',backgroundColor:'rgba(0,212,255,.15)',tension:.35,fill:true}]},options:chartOpts()}); charts.accChart=new Chart($('#accChart'),{type:'bar',data:{labels,datasets:[{label:'Akurasi',data:acc,backgroundColor:'rgba(16,185,129,.75)'}]},options:chartOpts()}); charts.errChart=new Chart($('#errChart'),{type:'pie',data:{labels:['Typo','Skip','Reverse'],datasets:[{data:[Math.max(1,state.history.reduce((a,h)=>a+h.errors,0)),3,2],backgroundColor:['#EF4444','#D4AF37','#8B5CF6']}]},options:{plugins:{legend:{labels:{color:'#F9FAFB'}}}}});}
function chartOpts(){return {responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#9CA3AF'},grid:{color:'#1F2937'}},y:{ticks:{color:'#9CA3AF'},grid:{color:'#1F2937'}}},plugins:{legend:{labels:{color:'#F9FAFB'}}}}}
function drawFallback(id,data,color){const c=$('#'+id); if(!c)return; const ctx=c.getContext('2d'),w=c.width=c.clientWidth,h=c.height=c.clientHeight;ctx.clearRect(0,0,w,h);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();data.forEach((v,i)=>{const x=20+i*(w-40)/Math.max(1,data.length-1),y=h-20-(v/Math.max(1,...data))*(h-40);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle='#9CA3AF';ctx.fillText('Chart fallback (CDN offline)',18,18)}
function buyUpgrade(id){const u=upgrades.find(x=>x.id===id); const lv=state.upgrades.levels[id]||0; const cost=Math.floor(u.baseCost*Math.pow(1.6,lv)); if(state.player.coins<cost)return toast('Coins belum cukup.','error'); state.player.coins-=cost; state.upgrades.levels[id]=lv+1; if(u.type==='partner')toast('🤝 Typing Partner aktif: duel memberi bonus XP!','success'); toast('Upgrade dibeli: '+u.name+' Lv.'+(lv+1),'success'); checkAchievements(); renderAll();}
function buyItem(id){const it=shopItems.find(x=>x.id===id); if(!state.owned.includes(id)){ if(state.player.coins<it.price)return toast('Coins belum cukup.','error'); state.player.coins-=it.price; state.owned.push(id); toast('Item dibeli: '+it.name,'success'); } if(it.prop==='booster'){const dur=it.value==='xp'?3600000:it.value==='coin'?1800000:600000; state.boosters[it.value+'Until']=Date.now()+dur; toast('Booster aktif: '+it.name,'success'); } else {state.settings[it.prop]=it.value; if(it.prop==='avatar')state.player.avatar=it.value; toast('Item aktif: '+it.name,'success');} applyTheme(); renderAll();}
function unlockSkill(n,cost){ if(state.skillUnlocked.includes(n))return; if(state.player.xp<cost)return toast('XP belum cukup untuk unlock skill.','error'); state.player.xp-=cost;state.skillUnlocked.push(n);toast('Skill unlocked: '+n,'success');renderAll();}
function prestige(){ if(state.player.level<10&&state.player.coins<50000)return toast('Prestige butuh Lv.10 atau 50.000 coins.','error'); if(!confirm('Prestige akan reset coins dan upgrade, tapi memberi token bonus permanen. Lanjut?'))return; state.player.prestige++; state.player.coins=100; state.player.level=1; state.player.xp=0; state.upgrades.levels={}; toast('💎 Prestige berhasil! Bonus income permanen +10%.','success');checkAchievements();renderAll();}
function openModal(html){$('#modal-container').innerHTML=`<div class="modal-backdrop"><div class="modal">${html}</div></div>`}
function closeModal(){ $('#modal-container').innerHTML=''; }
function tutorial(){openModal(`<div class="modal-head"><h2>📖 Onboarding TypeMaster</h2><button class="btn small" data-close>✕</button></div><div class="tabs">${[1,2,3,4,5,6].map(i=>`<button class="btn small ${i===1?'primary':''}" data-tut="${i}">Layar ${i}</button>`).join('')}</div><div id="tutorial-content"></div><div style="margin-top:14px"><button class="btn primary" id="tutorial-next">Lanjut</button> <button class="btn" data-close>Selesai</button></div>`); renderTutorial(1)}
function renderTutorial(i){const arr=[`<h3>1. Selamat datang!</h3><p>Masukkan nama karakter.</p><input class="text-input" id="tut-name" value="${state.player.name}"><button class="btn small" id="save-name">Simpan Nama</button>`,`<h3>2. Posisi tangan benar</h3>${fingerGuideHTML()}`,`<h3>3. Peta keyboard 10 jari</h3><p>Klik tombol virtual untuk melihat highlight; tombol berikutnya akan bersinar emas saat latihan.</p>`,`<h3>4. Tes kecepatan awal</h3><p>Mulai mode Kata 30 detik untuk kalibrasi level.</p><button class="btn cyan" data-page="practice" data-close id="calibration-start">Mulai Kalibrasi</button>`,`<h3>5. Coin & Upgrade</h3><p>Setiap kata memberi coin. Upgrade Auto-Typer memberi passive income tiap detik.</p>`,`<h3>6. Tujuan harian</h3><p>Pilih target: 500 kata, 60 WPM, 3 mode, dan 95% akurasi. Semua memberi reward.</p>`]; $('#tutorial-content').innerHTML=arr[i-1]; $('#tutorial-next').dataset.next=(i%6)+1; $$('.tabs [data-tut]').forEach(b=>b.classList.toggle('primary',+b.dataset.tut===i));}
function settingsModal(){openModal(`<div class="modal-head"><h2>⚙️ Pengaturan Lengkap</h2><button class="btn small" data-close>✕</button></div><div class="tabs">${['Umum','Tampilan','Audio','Latihan','Keyboard','Notifikasi'].map((t,i)=>`<button class="btn small ${i===0?'primary':''}" data-tab="set-${i}">${t}</button>`).join('')}</div><div id="set-0" class="tab-content active"><div class="setting-row"><b>Nama pengguna</b><input id="set-name" class="text-input" value="${state.player.name}"></div><div class="setting-row"><b>Avatar</b><select id="set-avatar" class="select"><option>🧑‍💻</option><option>🥷</option><option>👑</option><option>🤖</option><option>🦊</option></select></div><div class="setting-row"><b>Bahasa</b><select id="set-lang" class="select"><option value="id">Indonesia</option><option value="en">English</option></select></div><div class="setting-row"><b>Zona Waktu</b><span>Asia/Jakarta</span></div></div><div id="set-1" class="tab-content"><div class="setting-row"><b>Darker Mode</b><button class="toggle" data-toggle="theme"></button></div><div class="setting-row"><b>Ukuran font teks</b><select id="set-fontsize" class="select"><option>S</option><option>M</option><option>L</option><option>XL</option></select></div><div class="setting-row"><b>Animasi</b><select id="set-animation" class="select"><option value="full">Penuh</option><option value="minimal">Minimal</option><option value="off">Off</option></select></div><div class="setting-row"><b>Kontras tinggi</b><button class="toggle" data-toggle="contrast"></button></div></div><div id="set-2" class="tab-content"><div class="setting-row"><b>Suara keyboard</b><button class="toggle" data-toggle="sound"></button></div><div class="setting-row"><b>Volume suara tombol</b><input id="set-volume" class="range" type="range" min="0" max="1" step=".01" value="${state.settings.volume}"></div><div class="setting-row"><b>Sound Pack</b><select id="set-soundpack" class="select"><option value="mechanical">Keyboard Mechanical</option><option value="typewriter">Typewriter Classic</option><option value="scifi">Sci-Fi Beep</option><option value="silent">Silent Mode</option></select></div><div class="setting-row"><b>Musik background</b><button class="toggle" data-toggle="music"></button></div><div class="setting-row"><b>Sound effect UI</b><button class="toggle" data-toggle="uiSound"></button></div></div><div id="set-3" class="tab-content"><div class="setting-row"><b>Bahasa teks latihan</b><select id="set-prac-lang" class="select"><option value="id">Indonesia</option><option value="en">Inggris</option><option value="mix">Campuran</option></select></div><div class="setting-row"><b>Difficulty</b><select id="set-diff" class="select"><option value="auto">Auto-adapt</option><option value="manual">Manual</option></select></div><div class="setting-row"><b>Tampilkan WPM live</b><button class="toggle" data-toggle="showWPM"></button></div><div class="setting-row"><b>Mode strict</b><button class="toggle" data-toggle="strict"></button></div><div class="setting-row"><b>Panjang teks default</b><input id="set-length" type="range" min="30" max="180" value="${state.settings.textLength}" class="range"></div></div><div id="set-4" class="tab-content"><div class="setting-row"><b>Layout keyboard</b><select id="set-layout" class="select"><option>QWERTY</option><option>DVORAK</option><option>AZERTY</option></select></div><div class="setting-row"><b>Keyboard virtual</b><button class="toggle" data-toggle="keyboard"></button></div><div class="setting-row"><b>Highlight tombol berikutnya</b><button class="toggle" data-toggle="highlightNext"></button></div><div class="setting-row"><b>Warna jari</b><select class="select"><option>Default</option><option>Custom</option></select></div></div><div id="set-5" class="tab-content"><div class="setting-row"><b>Notifikasi daily challenge</b><button class="toggle on" data-simple-toast="Daily challenge reminder aktif"></button></div><div class="setting-row"><b>Reminder latihan harian</b><input type="time" class="select" value="19:00"></div><div class="setting-row"><b>Leaderboard alert</b><button class="toggle on" data-simple-toast="Leaderboard alert aktif"></button></div></div><button class="btn primary" id="save-settings">Simpan Pengaturan</button> <button class="btn" id="export-save-settings">Export Save</button>`); syncSettingsForm();}
function syncSettingsForm(){const s=state.settings; $('#set-avatar').value=state.player.avatar; $('#set-lang').value=s.language; $('#set-fontsize').value=s.fontSize; $('#set-animation').value=s.animation; $('#set-soundpack').value=s.soundPack; $('#set-diff').value=s.difficulty; $('#set-layout').value=s.layout; $$('.toggle[data-toggle]').forEach(t=>{const k=t.dataset.toggle; t.classList.toggle('on',k==='theme'?s.theme==='darker':!!s[k])})}
function saveSettings(){const s=state.settings; state.player.name=$('#set-name')?.value||state.player.name; state.player.avatar=$('#set-avatar')?.value||state.player.avatar; s.language=$('#set-lang')?.value||s.language; s.fontSize=$('#set-fontsize')?.value||s.fontSize; s.animation=$('#set-animation')?.value||s.animation; s.volume=parseFloat($('#set-volume')?.value||s.volume); s.soundPack=$('#set-soundpack')?.value||s.soundPack; s.difficulty=$('#set-diff')?.value||s.difficulty; s.textLength=parseInt($('#set-length')?.value||s.textLength,10); s.layout=$('#set-layout')?.value||s.layout; save();applyTheme();renderAll();toast('Pengaturan disimpan.','success')}
function applyTheme(){document.body.style.filter=state.settings.contrast?'contrast(1.15) saturate(1.2)':'none'; const area=$('#typing-area'); if(area){area.style.fontSize={S:'20px',M:'25px',L:'30px',XL:'36px'}[state.settings.fontSize]||'25px'; area.style.fontFamily=`${state.settings.font}, JetBrains Mono, monospace`;} const kb=$('#keyboard-visualizer'); if(kb){kb.style.borderColor=state.settings.skin==='gold'?'#D4AF37':state.settings.skin==='cyan'?'#00D4FF':state.settings.skin==='matrix'?'#10B981':'#1F2937';}}
function exportSave(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='typemaster-save.json';a.click();URL.revokeObjectURL(a.href);toast('Save diekspor.','success')}
function importSave(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';inp.onchange=()=>{const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{state=Object.assign(defaultState(),JSON.parse(rd.result));save();renderAll();toast('Import berhasil.','success')}catch(e){toast('File save tidak valid.','error')}};rd.readAsText(f)};inp.click()}
function switchPage(id){currentPage=id;$$('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+id));$$('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===id));renderKeyboard(); if(id==='stats')setTimeout(renderCharts,80); window.scrollTo({top:0,behavior:'smooth'});}
function handleClick(e){const b=e.target.closest('button,[data-page]'); if(!b)return; const rect=b.getBoundingClientRect(); if(b.tagName==='BUTTON'){const r=document.createElement('span');r.className='ripple';r.style.left=(e.clientX-rect.left)+'px';r.style.top=(e.clientY-rect.top)+'px';r.style.width=r.style.height=Math.max(rect.width,rect.height)+'px';b.appendChild(r);setTimeout(()=>r.remove(),600); if(state.settings.uiSound)play(600,.025,'triangle')}
 if(b.dataset.page){switchPage(b.dataset.page); if(b.hasAttribute('data-close'))closeModal()}
 if(b.dataset.mode){typing.mode=b.dataset.mode;renderPractice();toast('Mode dipilih: '+typing.mode)}
 if(b.id==='start-typing')startTyping(); if(b.id==='restart-typing')startTyping(); if(b.id==='home-sprint'||b.id==='start-featured'){switchPage('practice'); setTimeout(()=>{typing.mode='sprint';renderPractice();startTyping('sprint')},80)} if(b.id==='home-prestige')prestige(); if(b.id==='open-tutorial'||b.id==='open-guide'||b.id==='guide-btn')tutorial(); if(b.id==='settings-btn')settingsModal(); if(b.id==='notify-btn')toast('🔔 Notifikasi: misi harian, income idle, dan leaderboard aktif.','success'); if(b.classList.contains('buy-upgrade'))buyUpgrade(b.dataset.upgrade); if(b.classList.contains('buy-item'))buyItem(b.dataset.item); if(b.classList.contains('unlock-skill'))unlockSkill(b.dataset.skill,+b.dataset.cost); if(b.dataset.duel){switchPage('practice'); setTimeout(()=>{typing.ghost=b.dataset.duel;typing.mode='sprint';renderPractice();startTyping('sprint');toast('Duel melawan '+typing.ghost+' dimulai!','success')},80)} if(b.id==='copy-invite'){navigator.clipboard?.writeText('TYPE-'+Math.random().toString(36).slice(2,8).toUpperCase());toast('Kode undangan disalin.','success')} if(b.id==='share-result'){navigator.clipboard?.writeText($('#share-card').innerText);toast('Share card disalin.','success')} if(b.id==='export-save'||b.id==='export-save-settings')exportSave(); if(b.id==='import-save')importSave(); if(b.id==='reset-save'){if(confirm('Reset semua save?')){localStorage.removeItem('typemaster_save_v1');state=defaultState();renderAll();toast('Save direset.','success')}} if(b.hasAttribute('data-close'))closeModal(); if(b.dataset.tut)renderTutorial(+b.dataset.tut); if(b.id==='tutorial-next')renderTutorial(+b.dataset.next); if(b.id==='save-name'){state.player.name=$('#tut-name').value||'Player';renderAll();toast('Nama disimpan.','success')} if(b.dataset.tab){$$('.tab-content').forEach(x=>x.classList.remove('active'));$('#'+b.dataset.tab).classList.add('active');$$('[data-tab]').forEach(x=>x.classList.remove('primary'));b.classList.add('primary')} if(b.dataset.toggle){const k=b.dataset.toggle;if(k==='theme')state.settings.theme=state.settings.theme==='darker'?'dark':'darker';else state.settings[k]=!state.settings[k];b.classList.toggle('on',k==='theme'?state.settings.theme==='darker':state.settings[k]); if(k==='soundPack'&&state.settings.soundPack==='silent')state.settings.sound=false; save();applyTheme();toast('Toggle '+k+' diperbarui.','success')} if(b.dataset.simpleToast){b.classList.toggle('on');toast(b.dataset.simpleToast,'success')} if(b.id==='save-settings')saveSettings(); if(b.id==='modal-again'){closeModal();switchPage('practice');setTimeout(()=>startTyping(),40)} }
function handleChange(e){if(e.target.id==='difficulty')typing.difficulty=e.target.value;if(e.target.id==='duration')typing.duration=parseInt(e.target.value,10);}
function init(){try{renderAll();applyTheme();}catch(err){console.error('TypeMaster init render error:',err);toast('Terjadi error render awal, menjalankan mode aman.','error')}setTimeout(()=>{$('#loading-screen').style.opacity=0;setTimeout(()=>{$('#loading-screen').classList.add('hidden');$('#app').classList.remove('hidden')},450)},900); document.addEventListener('click',handleClick);document.addEventListener('change',handleChange);document.addEventListener('keydown',handleKey);window.addEventListener('beforeunload',save);setInterval(()=>{const inc=idleIncome(); if(inc>0){addCoins(inc);$('#coins-footer').textContent=fmt(state.player.coins);$('#notice-footer').textContent='Idle income +' + inc.toFixed(1) + ' coin'; checkAchievements()}},1000);setInterval(()=>{save();renderHeader()},30000); let seenTutorial=false;try{seenTutorial=localStorage.getItem('typemaster_seen_tutorial')==='1';}catch(e){seenTutorial=!!window.__typemasterSeenTutorial;} if(!seenTutorial){setTimeout(()=>{tutorial();try{localStorage.setItem('typemaster_seen_tutorial','1');}catch(e){window.__typemasterSeenTutorial=true;}},1600)} }
init();
})();
</script>
